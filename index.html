      $("#mobileSearch")?.addEventListener("input",e=>{state.search=e.target.value;const d=$("#desktopSearch");if(d)d.value=e.target.value;renderProducts()});
      $("#sortSelect")?.addEventListener("change",e=>{state.sort=e.target.value;renderProducts()});
      document.addEventListener("click",storeClick);
    }
    function storeClick(e){
      const action=e.target.closest("[data-action]")?.dataset.action;
      if(action){e.preventDefault();handleAction(action,e.target.closest("[data-action]"));return}
      if(e.target.closest("[data-scroll-products]"))$("#products")?.scrollIntoView({behavior:"smooth"});
    }
    function renderCategories(){
      const host=$("#categoryStrip");if(!host)return;
      host.innerHTML=CATEGORIES.map(c=>`<button class="category-chip ${state.category===c?"active":""}" data-category="${esc(c)}"><span>${c==="Tất cả"?"▦":c==="Giải trí"?"▶":c==="Sáng tạo"?"●":c==="AI"?"✦":"●"}</span>${esc(c)}</button>`).join("");
      host.onclick=e=>{const b=e.target.closest("[data-category]");if(!b)return;state.category=b.dataset.category;renderCategories();renderProducts()};
    }
    function renderProducts(){
      const host=$("#productGrid");if(!host)return;
      let list=PRODUCTS.filter(p=>(state.category==="Tất cả"||p.category===state.category)&&(!state.search.trim()||`${p.name} ${p.description}`.toLowerCase().includes(state.search.trim().toLowerCase())));
      if(state.sort==="price-low")list=[...list].sort((a,b)=>selectedPlan(a).price-selectedPlan(b).price);
      if(state.sort==="price-high")list=[...list].sort((a,b)=>selectedPlan(b).price-selectedPlan(a).price);
      if(!list.length){host.innerHTML=`<div class="empty" style="grid-column:1/-1">Không tìm thấy sản phẩm phù hợp.</div>`;return}
      host.innerHTML=list.map(p=>{
        const plan=selectedPlan(p),count=stockCount(p,plan),out=state.stockLoaded&&count<=0;
        const stockText=!state.stockLoaded?"còn 99":out?"Hết hàng":`Còn ${count} tài khoản`;
        return `<article class="product-card game-card ${out?"sold-out":""}" data-product="${p.id}">
          <div class="product-visual" style="background:linear-gradient(135deg,${p.soft} 0%, #ffffff 48%, ${p.accent}22 100%)">
            <span class="badge">${esc(p.badge)}</span>
           
            <span class="art-glow"></span>
            <span class="product-logo product-logo-${p.id}" style="color:${p.accent}"><img src="${esc(p.icon)}" alt="Logo ${esc(p.name)}" loading="lazy" referrerpolicy="no-referrer" onerror="this.hidden=true;this.nextElementSibling.hidden=false"><span class="logo-fallback" hidden>${esc(p.logo)}</span></span>
            <span class="banner-name">${esc(p.name)}</span>
          </div>
          <div class="product-body">
            <span class="product-category">${esc(p.category)}</span>
            <h3>${esc(p.name)}</h3>
            <p class="product-description">${esc(p.description)}</p>
            <select class="plan-select" data-plan-product="${p.id}">${p.plans.map((x,i)=>`<option value="${i}" ${x.name===plan.name?"selected":""}>${esc(x.name)}</option>`).join("")}</select>
            <div class="price-stock"><div><small>Giá gói</small><span class="price">${money(plan.price)}</span></div><span class="stock ${out?"out":""}"><i class="stock-dot"></i>${stockText}</span></div>
            <div class="meta-line"><span>Thời hạn: <b>${esc(plan.name)}</b></span><span>${out?'<b class="out-text">Hết hàng</b>':`<b>Còn ${state.stockLoaded?count:'?'}</b>`}</span></div>
            <div class="product-actions game-actions-row"><button class="buy-now" data-buy="${p.id}" ${out?"disabled":""}>Mua ngay</button><button class="add-cart detail-btn" data-add="${p.id}" ${out?"disabled":""}>Thêm vào giỏ</button></div>
          </div>${out?`<div class="sold-overlay"><strong>HẾT HÀNG</strong><span>Sản phẩm tạm hết hàng · Vui lòng chọn dịch vụ khác</span></div>`:""}</article>`
      }).join("");
      host.onchange=e=>{const s=e.target.closest("[data-plan-product]");if(!s)return;state.plans[s.dataset.planProduct]=Number(s.value);renderProducts()};
      host.onclick=e=>{if(e.target.closest('.wish-btn'))return;const add=e.target.closest("[data-add]");const buy=e.target.closest("[data-buy]");if(add)addCart(add.dataset.add,false);if(buy)addCart(buy.dataset.buy,true)};
    }
    function updateHeader(){
      $$('[data-balance]').forEach(el=>el.textContent=state.user?money(state.balance):"Đăng nhập");
      $$('[data-cart-count]').forEach(el=>el.textContent=cartCount());
    }
    function addCart(id,buy){
      const p=selectedProduct(id),plan=selectedPlan(p),count=stockCount(p,plan);
      if(state.stockLoaded&&count<=0)return;
      const key=`${p.id}|${plan.name}`,existing=state.cart.find(i=>i.key===key);
      if(existing)existing.quantity=Math.min(count||10,existing.quantity+1);else state.cart.push({key,product:p,plan,quantity:1});
      updateHeader();if(buy)openSheet("cart");
    }
    function handleAction(action,el){
      if(action==="cart")openSheet("cart");
      if(action==="topup")state.user?openSheet("topup"):openSheet("auth",{after:"topup"});
      if(action==="orders")state.user?openSheet("orders"):openSheet("auth",{after:"orders"});
      if(action==="mobile-menu")openSheet("menu");
    }

    function openSheet(view,payload=null){state.sheet=view;state.payload=payload;state.message="";state.error="";renderSheet()}
    function closeSheet(animated=true){
      const layer=$(".sheet-layer");if(!layer){state.sheet=null;return}
      const sheet=$(".sheet",layer);
      const remove=()=>{state.sheet=null;$("#sheetHost").innerHTML="";document.body.style.overflow=""};
      if(!animated){remove();return}
      sheet.style.animation="none";layer.style.animation="none";
      const menuSide=sheet.classList.contains("menu-sheet");
      requestAnimationFrame(()=>{
        sheet.style.transition="transform .28s cubic-bezier(.32,.72,0,1)";
        layer.style.transition="opacity .24s ease-out";
        sheet.style.transform=menuSide?"translate3d(-100%,0,0)":"translate3d(100%,0,0)";
        layer.style.opacity="0";
      });
      setTimeout(remove,290)
    }
    function sheetTitle(){return({cart:"Giỏ hàng của bạn",auth:"Tài khoản NovaKey",topup:"Nạp số dư",bankTopup:"Nạp bằng ngân hàng",cardTopup:"Nạp bằng thẻ cào",orders:"Đơn hàng của tôi",orderDetail:"Chi tiết đơn hàng",payment:"Chọn phương thức thanh toán",orderBank:"Thanh toán ngân hàng",orderCard:"Thanh toán bằng thẻ cào",menu:"NovaKey"})[state.sheet]||"NovaKey"}
    function renderSheet(){
      const host=$("#sheetHost");if(!state.sheet){host.innerHTML="";return}
      document.body.style.overflow="hidden";
      const menuMode=state.sheet==="menu";
      host.innerHTML=`<div class="sheet-layer ${menuMode?"menu-layer":""}"><aside class="sheet ${menuMode?"menu-sheet":""}"><div class="sheet-head"><div><h2>${sheetTitle()}</h2><small>${state.user?.email||"Mua hàng nhanh và an toàn"}</small></div><button class="icon-btn" data-sheet-action="close">×</button></div><div class="sheet-body">${sheetBody()}</div></aside></div>`;
      host.onclick=sheetClick;host.onsubmit=sheetSubmit;host.onchange=sheetChange;
      $(".sheet-layer",host).addEventListener("mousedown",e=>{if(e.target.classList.contains("sheet-layer"))closeSheet()});
      enableSwipe($(".sheet",host),$(".sheet-layer",host),menuMode?"left":"right");
    }
    function feedback(){return `${state.error?`<p class="error">${esc(state.error)}</p>`:""}${state.message?`<p class="success">${esc(state.message)}</p>`:""}`}
    function sheetBody(){
      if(state.sheet==="menu")return `<nav class="drawer-nav">
        <button class="drawer-item active" data-sheet-action="go-home"><span class="drawer-icon"><svg viewBox="0 0 24 24"><path d="M3 10.8 12 3l9 7.8"/><path d="M5.5 9.8V21h13V9.8"/><path d="M9.5 21v-7h5v7"/></svg></span><span><strong>Trang chủ</strong><small>Quay lại đầu trang</small></span><span class="drawer-arrow">›</span></button>
        <button class="drawer-item" data-sheet-action="go-products"><span class="drawer-icon"><svg viewBox="0 0 24 24"><circle cx="9" cy="20" r="1.4"/><circle cx="18" cy="20" r="1.4"/><path d="M2.5 3.5h2.7l2.1 11.1a2 2 0 0 0 2 1.6h8.6a2 2 0 0 0 1.9-1.5L21.5 7H6"/></svg></span><span><strong>Sản phẩm</strong><small>Xem toàn bộ dịch vụ</small></span><span class="drawer-arrow">›</span></button>
        <div class="drawer-divider"></div>
        <button class="drawer-item" data-sheet-action="topup"><span class="drawer-icon"><svg viewBox="0 0 24 24"><path d="M3 10h18"/><path d="M5 10v8M9 10v8M15 10v8M19 10v8"/><path d="M2 21h20M12 3 3 7v3h18V7z"/></svg></span><span><strong>Nạp tiền</strong><small>Nạp tiền tự động duyệt nhanh 1s</small></span><span class="drawer-arrow">›</span></button>
        <button class="drawer-item" data-sheet-action="orders"><span class="drawer-icon"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><path d="M3 4v5h5"/><path d="M12 7v5l3 2"/></svg></span><span><strong>Lịch sử mua</strong><small>Lịch sử đơn hàng</small></span><span class="drawer-arrow">›</span></button>
        ${state.settings.zaloUrl?`<div class="drawer-help"><strong>Bạn cần hỗ trợ?</strong><p>Liên hệ NovaKey để đựợc hỗ trợ.</p><a href="${esc(state.settings.zaloUrl)}" target="_blank" rel="noopener">Liên hệ Zalo</a></div>`:""}
      </nav>`;
      if(state.sheet==="auth")return authMarkup();
      if(state.sheet==="cart")return cartMarkup();
      if(state.sheet==="payment")return paymentMarkup();
      if(state.sheet==="topup")return topupMarkup();
      if(state.sheet==="bankTopup")return bankTopupMarkup();
      if(state.sheet==="cardTopup")return cardTopupMarkup();
      if(state.sheet==="orders")return ordersMarkup();
      if(state.sheet==="orderDetail")return orderDetailMarkup(state.payload);
      if(state.sheet==="orderBank")return orderBankMarkup(state.payload);
      if(state.sheet==="orderCard")return orderCardMarkup();
      return "";
    }
    function authMarkup(){return `<form class="form" data-form="auth"><div class="panel-card"><strong id="authTitle">Đăng nhập để tiếp tục</strong><p style="font-size:10px;color:var(--muted);line-height:1.5">Đơn hàng, số dư và thông tin bàn giao được bảo vệ theo tài khoản.</p></div><label>Email<input name="email" type="email" autocomplete="email" required placeholder="email@example.com"></label><label>Mật khẩu<input name="password" type="password" minlength="6" required placeholder="Tối thiểu 6 ký tự"></label>${feedback()}<button class="full-btn" type="submit" data-mode="login">Đăng nhập</button><button class="outline-btn" type="button" data-sheet-action="toggle-auth">Chưa có tài khoản? Đăng ký</button></form>`}
    function cartMarkup(){
      if(!state.cart.length)return `<div class="empty">🛒<h3>Giỏ hàng đang trống</h3><p>Chọn sản phẩm phù hợp để bắt đầu đặt hàng.</p><button class="full-btn" data-sheet-action="close">Xem sản phẩm</button></div>`;
      return `<div>${state.cart.map(i=>`<article class="cart-item"><span class="mini-logo mini-logo-${i.product.id}" style="background:${i.product.soft};color:${i.product.accent}"><img src="${esc(i.product.icon)}" alt="" loading="lazy" referrerpolicy="no-referrer" onerror="this.hidden=true;this.nextElementSibling.hidden=false"><span class="logo-fallback" hidden>${esc(i.product.logo)}</span></span><div><strong>${esc(i.product.name)}</strong><small>${esc(i.plan.name)}</small><b>${money(i.plan.price)}</b><div class="qty"><button data-qty="-1" data-key="${esc(i.key)}">−</button><span>${i.quantity}</span><button data-qty="1" data-key="${esc(i.key)}">＋</button></div></div><button class="remove" data-remove="${esc(i.key)}">Xóa</button></article>`).join("")}</div><div class="summary"><div class="summary-row"><span>Tạm tính</span><b>${money(cartTotal())}</b></div><div class="summary-row"><span>Phí xử lý</span><b>0đ</b></div><div class="summary-row total"><span>Tổng cộng</span><b>${money(cartTotal())}</b></div>${feedback()}<button class="full-btn" data-sheet-action="checkout">Chọn phương thức thanh toán</button></div>`
    }
    function paymentMarkup(){return `<button class="back" data-sheet-action="back-cart">← Quay lại giỏ hàng</button><div class="panel-card balance-card"><span>Cần thanh toán</span><strong>${money(cartTotal())}</strong><small>${cartCount()} sản phẩm</small></div><p class="choice-label">Thanh toán bằng số dư</p><button class="method" data-sheet-action="pay-balance"><span class="method-icon">▤</span><span><strong>Số dư NovaKey</strong><small>Hiện có ${money(state.balance)}</small></span><span class="arrow">›</span></button><p class="choice-label">Hoặc thanh toán trực tiếp</p><div class="method-list"><button class="method" data-sheet-action="pay-bank"><span class="method-icon">🏦</span><span><strong>Chuyển khoản ngân hàng</strong><small>Quét VietQR, đúng số tiền và nội dung</small></span><span class="arrow">›</span></button><button class="method" data-sheet-action="pay-card"><span class="method-icon">▰</span><span><strong>Thanh toán bằng thẻ cào</strong><small>Viettel, Mobifone, Vinaphone</small></span><span class="arrow">›</span></button></div>${feedback()}`}
    function topupMarkup(){return `<button class="back" data-sheet-action="close">← Quay lại</button><div class="panel-card balance-card"><span>Số dư hiện tại</span><strong>${money(state.balance)}</strong><small>${esc(state.user?.email)}</small></div>${feedback()}<p class="choice-label">Chọn phương thức nạp</p><div class="method-list"><button class="method" data-sheet-action="open-bank-topup"><span class="method-icon">🏦</span><span><strong>Chuyển khoản ngân hàng</strong><small>QR và nội dung riêng cho tài khoản</small></span><span class="arrow">›</span></button><button class="method" data-sheet-action="open-card-topup"><span class="method-icon">▰</span><span><strong>Nạp bằng thẻ cào</strong><small>Hiển thị rõ số tiền thực nhận</small></span><span class="arrow">›</span></button></div><p class="choice-label">Lịch sử nạp gần đây</p>${state.topups.length?state.topups.slice(0,5).map(t=>`<div class="order-card"><div class="order-top"><strong>${esc(t.reference)}</strong><span class="status ${t.status}">${STATUS[t.status]||esc(t.status)}</span></div><p>${t.method==="bank"?"Ngân hàng":"Thẻ cào"} · ${t.approvedAmount?money(t.approvedAmount):t.expectedCredit?`Dự kiến ${money(t.expectedCredit)}`:"Chờ đối soát"}</p></div>`).join(""):`<div class="empty">Chưa có giao dịch nạp tiền.</div>`}`}
    function userBankContent(){return `NVK${(state.user?.uid||"USER").slice(0,10).toUpperCase()}`}
    function bankQr({amount=0,content}){
      const s=state.settings;if(!s.bankId||!s.accountNumber)return "";
      const q=new URLSearchParams();if(amount>0)q.set("amount",String(amount));q.set("addInfo",content);q.set("accountName",s.accountName||"");
      return `https://img.vietqr.io/image/${encodeURIComponent(s.bankId)}-${encodeURIComponent(s.accountNumber)}-compact2.png?${q}`
    }
    function bankTopupMarkup(){
      const content=userBankContent(),qr=bankQr({content});
      return `<button class="back" data-sheet-action="back-topup">← Chọn cách nạp khác</button><div class="min-topup">⚠ Nạp tối thiểu 2.000đ để hệ thống có thể đối soát tự động.</div><div class="notice">Mỗi tài khoản có một nội dung chuyển tiền riêng. Vui lòng giữ nguyên nội dung bên dưới.</div>${qr?`<div class="qr-wrap"><div class="qr-card"><img src="${qr}" alt="VietQR nạp số dư"></div></div>`:`<div class="error">Admin chưa cấu hình tài khoản ngân hàng.</div>`}<div class="transfer-info"><div class="transfer-row"><span>Ngân hàng</span><b>${esc(state.settings.bankName||"Chưa cấu hình")}</b></div><div class="transfer-row"><span>Số tài khoản</span><b>${esc(state.settings.accountNumber||"-")}</b></div><div class="transfer-row"><span>Chủ tài khoản</span><b>${esc(state.settings.accountName||"-")}</b></div><div class="transfer-row"><span>Số tiền</span><b>Từ 2.000đ</b></div><div class="transfer-row"><span>Nội dung bắt buộc</span><b style="color:var(--blue)">${content}</b></div></div>${feedback()}<button class="full-btn" style="margin-top:15px" data-sheet-action="confirm-bank-topup" ${qr?"":"disabled"}>Tôi đã chuyển khoản</button><p style="font-size:9px;color:var(--muted);text-align:center;line-height:1.5">Hệ thống ghi nhận yêu cầu theo nội dung riêng của tài khoản.</p>`
    }
    function cardTopupMarkup(){

      return `<button class="back" data-sheet-action="back-topup">← Chọn cách nạp khác</button><div class="notice-important"><div class="notice-title">⚠ LƯU Ý QUAN TRỌNG</div><div class="notice-content"><b>Vui lòng nhập đúng số seri thẻ, mã thẻ và chọn đúng mệnh giá thẻ.</b><div class="divider"></div><strong>Xử lý trường hợp nhập sai mệnh giá:</strong> Nếu khai báo sai mệnh giá thẻ, giao dịch sẽ được tính trên <b>50%</b> giá trị của mệnh giá thấp hơn.</div></div><form class="form" data-form="card-topup"><label>Loại thẻ<select name="provider"><option>Viettel</option><option>Mobifone</option><option>Vinaphone</option></select></label><label>Mệnh giá<select name="face" id="cardFace">${CARD_RATES.map(x=>`<option value="${x.face}" ${x.face===rate.face?"selected":""}>${money(x.face)} - Nhận ${money(x.receive)}</option>`).join("")}</select></label><label>Serial thẻ<input name="serial" inputmode="numeric" required minlength="6" placeholder="Nhập số seri thẻ"></label><label>Mã thẻ (PIN)<input name="pin" inputmode="numeric" required minlength="6" placeholder="Nhập mã thẻ"></label><div class="receive-box"><span>Số tiền thực nhận</span><strong>${money(rate.receive)}</strong></div>${feedback()}<button class="full-btn" type="submit">NẠP THẺ NGAY</button></form>`

    function ordersMarkup(){return `<div class="panel-card" style="margin-bottom:14px"><span style="font-size:10px;color:var(--muted)">Tài khoản đang dùng</span><strong style="display:block;font-size:12px;margin-top:4px">${esc(state.user?.email)}</strong><button class="back" style="margin:10px 0 0" data-sheet-action="logout">Đăng xuất</button></div>${state.orders.length?state.orders.map(o=>`<button class="order-card" data-order="${o.id}"><div class="order-top"><div><strong>${esc(o.orderCode)}</strong><small style="display:block;margin-top:4px;color:var(--muted)">${time(o.createdAt)}</small></div><span class="status ${o.status}">${STATUS[o.status]||esc(o.status)}</span></div><p>${o.items?.slice(0,2).map(i=>`${esc(i.productName)} × ${i.quantity}`).join(" · ")}</p><b style="color:var(--blue)">${money(o.total)}</b></button>`).join(""):`<div class="empty">Chưa có đơn hàng.</div>`}`}
    function orderDetailMarkup(o){if(!o)return `<div class="empty">Không tìm thấy đơn hàng.</div>`;return `<button class="back" data-sheet-action="back-orders">← Danh sách đơn hàng</button><div class="panel-card"><span class="status ${o.status}">${STATUS[o.status]||esc(o.status)}</span><h3>${esc(o.orderCode)}</h3><p style="font-size:10px;color:var(--muted)">${time(o.createdAt)}</p><div class="divider"></div>${o.items?.map(i=>`<div class="summary-row"><span>${esc(i.productName)} · ${esc(i.planName)} × ${i.quantity}</span><b>${money(i.lineTotal)}</b></div>`).join("")}<div class="summary-row total"><span>Tổng cộng</span><b>${money(o.total)}</b></div></div>${o.status==="awaiting_payment"&&o.paymentMethod==="bank"?`<button class="full-btn" style="margin-top:14px" data-resume-bank="${o.id}">Mở lại mã QR</button>`:""}${o.status==="fulfilled"?`<p class="choice-label">Thông tin bàn giao</p>${(o.delivery||[]).map(d=>`<div class="delivery"><strong>${esc(d.productName)} · ${esc(d.planName)}</strong>${d.type==="credential"?`<code>Tài khoản: ${esc(d.account)}</code><code>Mật khẩu: ${esc(d.password)}</code>`:`<p>${esc(d.note)}</p>`}</div>`).join("")}`:`<div class="notice" style="margin-top:14px">${o.status==="rejected"?esc(o.rejectionReason||"Không xác minh được giao dịch."):"Đơn đang chờ xử lý. Thông tin bàn giao sẽ tự xuất hiện sau khi được duyệt."}</div>`}`}
    function orderBankMarkup(o){
      const qr=bankQr({amount:o.total,content:o.orderCode});
      return `<button class="back" data-sheet-action="back-payment">← Chọn cách khác</button>${qr?`<div class="qr-wrap"><div class="qr-card"><img src="${qr}" alt="VietQR thanh toán đơn hàng"></div></div>`:`<div class="error">Admin chưa cấu hình tài khoản ngân hàng.</div>`}<div class="transfer-info"><div class="transfer-row"><span>Ngân hàng</span><b>${esc(state.settings.bankName||"-")}</b></div><div class="transfer-row"><span>Số tài khoản</span><b>${esc(state.settings.accountNumber||"-")}</b></div><div class="transfer-row"><span>Số tiền</span><b style="color:var(--blue)">${money(o.total)}</b></div><div class="transfer-row"><span>Nội dung</span><b style="color:var(--blue)">${esc(o.orderCode)}</b></div></div>${feedback()}<button class="full-btn" style="margin-top:15px" data-sheet-action="confirm-order-bank" data-order-id="${o.id}">Tôi đã chuyển khoản</button>`
    }
    function orderCardMarkup(){
      const face=Number(state.payload?.face||100000),rate=CARD_RATES.find(x=>x.face===face)||CARD_RATES[4];

    async function sheetClick(e){
      const a=e.target.closest("[data-sheet-action]")?.dataset.sheetAction;
      if(a){e.preventDefault();await sheetAction(a,e.target.closest("[data-sheet-action]"));return}
      const qty=e.target.closest("[data-qty]");if(qty){const item=state.cart.find(i=>i.key===qty.dataset.key);if(item){item.quantity+=Number(qty.dataset.qty);if(item.quantity<=0)state.cart=state.cart.filter(i=>i!==item);renderSheet();updateHeader()}return}
      const rem=e.target.closest("[data-remove]");if(rem){state.cart=state.cart.filter(i=>i.key!==rem.dataset.remove);renderSheet();updateHeader();return}
      const order=e.target.closest("[data-order]");if(order){const o=state.orders.find(x=>x.id===order.dataset.order);openSheet("orderDetail",o);return}
      const resume=e.target.closest("[data-resume-bank]");if(resume){const o=state.orders.find(x=>x.id===resume.dataset.resumeBank);openSheet("orderBank",o)}
    }
    async function sheetAction(a,el){
      if(a==="close")return closeSheet();
      if(a==="go-home"){closeSheet();setTimeout(()=>$("#top")?.scrollIntoView({behavior:"smooth"}),300);return}
      if(a==="go-products"){closeSheet();setTimeout(()=>$("#products")?.scrollIntoView({behavior:"smooth"}),300);return}
      if(a==="topup")return state.user?openSheet("topup"):openSheet("auth",{after:"topup"});
      if(a==="orders")return state.user?openSheet("orders"):openSheet("auth",{after:"orders"});
      if(a==="toggle-auth"){const form=$("[data-form=auth]");const btn=$("[data-mode]",form);const login=btn.dataset.mode==="login";btn.dataset.mode=login?"register":"login";btn.textContent=login?"Đăng ký":"Đăng nhập";el.textContent=login?"Đã có tài khoản? Đăng nhập":"Chưa có tài khoản? Đăng ký";$("#authTitle").textContent=login?"Tạo tài khoản NovaKey":"Đăng nhập để tiếp tục";return}
      if(a==="checkout"){if(!state.user)return openSheet("auth",{after:"payment"});return openSheet("payment")}
      if(a==="back-cart")return openSheet("cart");
      if(a==="back-payment")return openSheet("payment");
      if(a==="back-topup")return openSheet("topup");
      if(a==="back-orders")return openSheet("orders");
      if(a==="open-bank-topup")return openSheet("bankTopup");
      if(a==="open-card-topup")return openSheet("cardTopup",{face:100000});
      if(a==="pay-bank")return createOrder("bank");
      if(a==="pay-card")return openSheet("orderCard",{face:100000});
      if(a==="pay-balance")return createOrder("balance");
      if(a==="confirm-bank-topup")return confirmBankTopup(el);
      if(a==="confirm-order-bank")return confirmOrderBank(el.dataset.orderId);
      if(a==="logout"){await signOut(auth);closeSheet();return}
    }
    function sheetChange(e){
      if(e.target.id==="cardFace"||e.target.id==="orderCardFace"){
        const face=Number(e.target.value),rate=CARD_RATES.find(x=>x.face===face)||CARD_RATES[4];
        state.payload={...(state.payload||{}),face:rate.face};
        const amount=e.target.closest("form")?.querySelector(".receive-box strong");
        if(amount)amount.textContent=money(rate.receive);
      }
    }
    async function sheetSubmit(e){
      e.preventDefault();const form=e.target,kind=form.dataset.form;state.error="";state.message="";
      try{
        if(kind==="auth"){
          const data=new FormData(form),mode=$("[data-mode]",form).dataset.mode,email=data.get("email").trim(),password=data.get("password");
          if(mode==="register")await createUserWithEmailAndPassword(auth,email,password);else await signInWithEmailAndPassword(auth,email,password);
          const after=state.payload?.after||"cart";openSheet(after);return;
        }
        if(kind==="card-topup")return submitCardTopup(form);
        if(kind==="order-card")return submitOrderCard(form);
      }catch(err){console.error(err);state.error=friendlyError(err);renderSheet()}
    }
    function friendlyError(err){const c=err?.code||"";if(c.includes("invalid-credential"))return"Email hoặc mật khẩu không đúng.";if(c.includes("email-already"))return"Email này đã được sử dụng.";if(c.includes("permission-denied"))return"Firebase Rules chưa cho phép thao tác này.";return err?.message||"Không thể hoàn tất thao tác, vui lòng thử lại."}

    function orderPayload(method,card=null){
      const items=state.cart.map(i=>({productId:i.product.id,productName:i.product.name,planName:i.plan.name,unitPrice:i.plan.price,quantity:i.quantity,lineTotal:i.plan.price*i.quantity}));
      return {userId:state.user.uid,customerEmail:state.user.email||"",paymentMethod:method,items,itemCount:cartCount(),total:cartTotal(),status:method==="bank"?"awaiting_payment":"payment_review",card,delivery:[],rejectionReason:"",createdAt:serverTimestamp(),updatedAt:serverTimestamp()}
    }
    function validateCart(){
      if(!state.cart.length)throw Error("Giỏ hàng đang trống.");
      for(const i of state.cart){const count=stockCount(i.product,i.plan);if(state.stockLoaded&&count<i.quantity)throw Error(`${i.product.name} - ${i.plan.name} chỉ còn ${count} tài khoản.`)}
    }
    async function createOrder(method,card=null){
      try{
        if(!state.user)return openSheet("auth",{after:"payment"});validateCart();
        if(method==="balance"&&state.balance<cartTotal())throw Error(`Số dư còn thiếu ${money(cartTotal()-state.balance)}.`);
        const ref=doc(collection(db,"orders")),code=`NVK-${ref.id.slice(0,8).toUpperCase()}`;
        const data={...orderPayload(method,card),orderCode:code};await setDoc(ref,data);
        const o={id:ref.id,...data,createdAt:null};
        if(method==="bank")openSheet("orderBank",o);else{state.cart=[];updateHeader();openSheet("orderDetail",{...o,status:"payment_review"});state.message="Đơn đã được gửi và đang chờ duyệt."}
      }catch(err){state.error=friendlyError(err);renderSheet()}
    }
    async function confirmOrderBank(id){
      try{await updateDoc(doc(db,"orders",id),{status:"payment_review",updatedAt:serverTimestamp()});state.cart=[];updateHeader();const o=state.orders.find(x=>x.id===id)||state.payload;openSheet("orderDetail",{...o,status:"payment_review"});state.message="Đã ghi nhận, đơn đang chờ đối soát.";renderSheet()}catch(err){state.error=friendlyError(err);renderSheet()}
    }
    async function submitOrderCard(form){
      const d=new FormData(form),face=Number(d.get("face")),rate=CARD_RATES.find(x=>x.face===face);if(!rate)throw Error("Mệnh giá không hợp lệ.");
      const serial=d.get("serial").trim(),pin=d.get("pin").trim();if(serial.length<6||pin.length<6)throw Error("Vui lòng nhập đúng serial và mã thẻ.");
      await createOrder("card",{provider:d.get("provider"),serial,code:pin,declaredAmount:face,expectedCredit:rate.receive});
    }

      try{
        const ref=doc(collection(db,"topups"));await setDoc(ref,{userId:state.user.uid,customerEmail:state.user.email||"",reference:userBankContent(),method:"bank",amount:0,minimumAmount:2000,approvedAmount:0,status:"payment_review",createdAt:serverTimestamp(),updatedAt:serverTimestamp()});
        openSheet("topup");state.message="Đã ghi nhận yêu cầu. Hệ thống sẽ đối soát theo nội dung chuyển tiền riêng.";renderSheet();

    }
    async function submitCardTopup(form){
      const d=new FormData(form),face=Number(d.get("face")),rate=CARD_RATES.find(x=>x.face===face);if(!rate)throw Error("Mệnh giá không hợp lệ.");
      const serial=d.get("serial").trim(),pin=d.get("pin").trim();if(serial.length<6||pin.length<6)throw Error("Vui lòng nhập đúng serial và mã thẻ.");
      const ref=doc(collection(db,"topups")),reference=`THE-${ref.id.slice(0,8).toUpperCase()}`;
      await setDoc(ref,{userId:state.user.uid,customerEmail:state.user.email||"",reference,method:"card",amount:face,expectedCredit:rate.receive,approvedAmount:0,status:"payment_review",card:{provider:d.get("provider"),serial,code:pin,declaredAmount:face},createdAt:serverTimestamp(),updatedAt:serverTimestamp()});
      openSheet("topup");state.message=`Đã gửi thẻ, số tiền dự kiến nhận ${money(rate.receive)}.`;renderSheet();
    }

    function enableSwipe(sheet,layer,side="right"){
      if(!sheet||!layer)return;
      const direction=side==="left"?-1:1;

      let tracking=false,dragging=false,activeTouchId=null,lastTouchAt=0;
      let startX=0,startY=0,startOffset=0,currentX=0,targetX=0,sheetWidth=1;
      let frame=0,samples=[],suppressClickUntil=0;

      const clamp=(x,min=0,max=sheetWidth)=>Math.max(min,Math.min(max,x));
      const rubberBand=distance=>{
        const d=Math.max(1,sheetWidth),c=.55;
        return Math.min(24,(1-(1/(distance*c/d+1)))*d);
      };
      const resisted=x=>x<0?-rubberBand(-x):x>sheetWidth?sheetWidth+rubberBand(x-sheetWidth):x;
      const paint=()=>{
        frame=0;
        currentX=targetX;
        const progress=clamp(currentX/sheetWidth,0,1);
        sheet.style.transform=`translate3d(${direction*currentX}px,0,0)`;
        layer.style.opacity=String(Math.max(0,1-progress));
      };
      const setPosition=x=>{
        targetX=resisted(x);
        if(!frame)frame=requestAnimationFrame(paint);
      };
      const flush=()=>{
        if(frame){cancelAnimationFrame(frame);frame=0}
        paint();
      };
      const detachTouch=()=>{
        window.removeEventListener("touchmove",onTouchMove,true);
        window.removeEventListener("touchend",onTouchEnd,true);
        window.removeEventListener("touchcancel",onTouchCancel,true);
      };
      const clearDragState=()=>{
        detachTouch();
        tracking=false;dragging=false;activeTouchId=null;samples=[];
        document.body.style.userSelect="";
        document.body.style.webkitUserSelect="";
        sheet.classList.remove("is-dragging");
        layer.classList.remove("is-dragging");
      };
      const record=(x,t=performance.now())=>{
        samples.push({x,t});
        while(samples.length>2&&samples[1].t<t-110)samples.shift();
      };
      const velocity=()=>{
        const first=samples[0],last=samples[samples.length-1];
        return first&&last&&last.t>first.t?(last.x-first.x)/(last.t-first.t):0;
      };
      const settle=(close,speed=0)=>{
        flush();
        const destination=close?sheetWidth:0;
        const distance=Math.abs(destination-currentX);
        const duration=Math.round(Math.max(180,Math.min(340,260+distance/sheetWidth*80-Math.abs(speed)*90)));

        clearDragState();
        sheet.style.transition=`transform ${duration}ms cubic-bezier(.32,.72,0,1)`;
        layer.style.transition=`opacity ${Math.min(duration,260)}ms ease-out`;
        requestAnimationFrame(()=>{
          sheet.style.transform=`translate3d(${direction*destination}px,0,0)`;
          layer.style.opacity=close?"0":"1";
        });

        if(close){
          sheet.style.pointerEvents="none";
          setTimeout(()=>closeSheet(false),duration+20);
        }
      };
      const finish=cancelled=>{
        if(!tracking)return;
        if(!dragging){clearDragState();return}
        flush();
        const speed=velocity();
        const projected=currentX+speed*190;
        const shouldClose=!cancelled&&(speed>.38||projected>sheetWidth*.36);
        settle(shouldClose,speed);
      };
      const readLiveX=()=>{
        const liveTransform=getComputedStyle(sheet).transform;
        let liveX=0;
        if(liveTransform&&liveTransform!=="none"){
          try{liveX=new DOMMatrixReadOnly(liveTransform).m41}catch{}
        }
        return liveX;
      };
      const begin=(x,y)=>{
        if(tracking)return false;
        tracking=true;dragging=false;
        sheetWidth=Math.max(1,sheet.getBoundingClientRect().width);
        startX=x;startY=y;startOffset=clamp(readLiveX()*direction);
        currentX=targetX=startOffset;samples=[];record(startOffset);
        sheet.style.animation="none";layer.style.animation="none";
        sheet.style.transition="none";layer.style.transition="none";
        sheet.style.transform=`translate3d(${direction*startOffset}px,0,0)`;
        return true;
      };
      const move=(x,y,event)=>{
        if(!tracking)return;
        const dx=x-startX,dy=y-startY,ax=Math.abs(dx),ay=Math.abs(dy);

        if(!dragging){
          if(Math.hypot(dx,dy)<5)return;
          if(ay>12&&ay>ax*1.35){clearDragState();return}
          if(ax<ay*.72)return;
          dragging=true;suppressClickUntil=performance.now()+450;
          sheet.classList.add("is-dragging");layer.classList.add("is-dragging");
          document.body.style.userSelect="none";document.body.style.webkitUserSelect="none";
        }

        event?.preventDefault?.();
        const next=startOffset+direction*dx;
        setPosition(next);record(clamp(next));
      };
      const findTouch=(list,id)=>{
        for(const touch of list||[])if(touch.identifier===id)return touch;
        return null;
      };
      const onTouchMove=e=>{
        const touch=findTouch(e.touches,activeTouchId);
        if(touch)move(touch.clientX,touch.clientY,e);
      };
      const onTouchEnd=e=>{
        const touch=findTouch(e.changedTouches,activeTouchId);
        if(touch&&dragging){
          const next=startOffset+direction*(touch.clientX-startX);
          setPosition(next);record(clamp(next));
        }
        finish(false);
      };
      const onTouchCancel=()=>finish(true);

      sheet.addEventListener("touchstart",e=>{
        if(e.touches.length!==1||e.target.closest("input,textarea,select"))return;
        const touch=e.touches[0];
        lastTouchAt=performance.now();
        if(!begin(touch.clientX,touch.clientY))return;
        activeTouchId=touch.identifier;
        window.addEventListener("touchmove",onTouchMove,{capture:true,passive:false});
        window.addEventListener("touchend",onTouchEnd,{capture:true,passive:true});
        window.addEventListener("touchcancel",onTouchCancel,{capture:true,passive:true});
      },{passive:true});

      sheet.addEventListener("mousedown",e=>{
        if(e.button!==0||performance.now()-lastTouchAt<700||e.target.closest("input,textarea,select"))return;
        if(!begin(e.clientX,e.clientY))return;
        const onMouseMove=ev=>move(ev.clientX,ev.clientY,ev);
        const onMouseUp=ev=>{
          if(dragging){const next=startOffset+direction*(ev.clientX-startX);setPosition(next);record(clamp(next))}
          window.removeEventListener("mousemove",onMouseMove,true);
          window.removeEventListener("mouseup",onMouseUp,true);
          finish(false);
        };
        window.addEventListener("mousemove",onMouseMove,true);
        window.addEventListener("mouseup",onMouseUp,true);
      });
      sheet.addEventListener("click",e=>{
        if(performance.now()<suppressClickUntil){e.preventDefault();e.stopImmediatePropagation()}
      },true);
    }

    function clearUserSubs(){[unsubWallet,unsubOrders,unsubTopups].forEach(u=>u?.());unsubWallet=unsubOrders=unsubTopups=null;state.balance=0;state.orders=[];state.topups=[]}
    function subscribePublic(){
      unsubSettings=onSnapshot(doc(db,"settings","payment"),s=>{state.settings=s.exists()?{...defaultSettings,...s.data()}:{...defaultSettings};if(state.sheet==="bankTopup"||state.sheet==="orderBank")renderSheet();if(isAdminPage&&state.admin&&state.adminTab==="settings")renderAdmin()},()=>{});
      unsubStock=onSnapshot(collection(db,"stock"),snap=>{state.stock.clear();snap.forEach(d=>{const x=d.data();state.stock.set(`${x.productId}|${x.planName}`,Number(x.count)||0)});state.stockLoaded=true;if(!isAdminPage)renderProducts()},err=>{console.warn(err);state.stockLoaded=false;if(!isAdminPage)renderProducts()});
    }
    function subscribeUser(user){
      clearUserSubs();if(!user){updateHeader();return}
      unsubWallet=onSnapshot(doc(db,"wallets",user.uid),s=>{state.balance=s.exists()?Number(s.data().balance)||0:0;updateHeader();if(state.sheet==="topup"||state.sheet==="payment")renderSheet()},()=>{});
      unsubOrders=onSnapshot(query(collection(db,"orders"),where("userId","==",user.uid)),snap=>{state.orders=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));if(["orders","orderDetail"].includes(state.sheet))renderSheet()},()=>{});
      unsubTopups=onSnapshot(query(collection(db,"topups"),where("userId","==",user.uid)),snap=>{state.topups=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));if(state.sheet==="topup")renderSheet()},()=>{});
    }

    function adminSection(){if(state.adminTab==="orders")return adminOrdersMarkup();if(state.adminTab==="topups")return adminTopupsMarkup();if(state.adminTab==="inventory")return adminInventoryMarkup();return adminSettingsMarkup()}
    function adminOrdersMarkup(){return `<div class="admin-title"><div><span class="kicker">Đơn hàng</span><h1>Đối soát và giao sản phẩm</h1></div><small>${state.adminOrders.length} đơn gần nhất</small></div><div class="admin-list">${state.adminOrders.length?state.adminOrders.map(o=>`<article class="admin-record"><div class="admin-record-head"><div><strong>${esc(o.orderCode)}</strong><small>${esc(o.customerEmail||o.userId)}</small></div><span class="status ${o.status}">${STATUS[o.status]||esc(o.status)}</span></div><div class="record-meta"><span>${o.paymentMethod==="bank"?"Ngân hàng":o.paymentMethod==="card"?"Thẻ cào":"Số dư"}</span><span>${time(o.createdAt)}</span><b>${money(o.total)}</b></div><div class="record-items">${(o.items||[]).map(i=>`<div>${esc(i.productName)} · ${esc(i.planName)} × ${i.quantity} — ${money(i.lineTotal)}</div>`).join("")}</div>${o.card?`<div class="secret"><b>${esc(o.card.provider)}</b><br>Serial: ${esc(o.card.serial)}<br>Mã thẻ: ${esc(o.card.code)}<br>Mệnh giá khai báo: ${money(o.card.declaredAmount||0)} · Dự kiến nhận: ${money(o.card.expectedCredit||0)}</div>`:""}${o.status==="payment_review"?`<div class="record-actions"><button data-approve-order="${o.id}">Duyệt & giao từ kho</button><button class="secondary-admin" data-support-order="${o.id}">Giao hỗ trợ</button><button class="danger" data-reject-order="${o.id}">Từ chối</button></div>`:""}</article>`).join(""):`<div class="empty">Chưa có đơn hàng.</div>`}</div>`}
    function adminTopupsMarkup(){return `<div class="admin-title"><div><span class="kicker">Nạp số dư</span><h1>Duyệt ngân hàng và thẻ cào</h1></div></div><div class="admin-list">${state.adminTopups.length?state.adminTopups.map(t=>`<article class="admin-record"><div class="admin-record-head"><div><strong>${esc(t.reference)}</strong><small>${esc(t.customerEmail||t.userId)}</small></div><span class="status ${t.status}">${STATUS[t.status]||esc(t.status)}</span></div><div class="record-meta"><span>${t.method==="bank"?"Chuyển khoản":"Thẻ cào"}</span><span>${time(t.createdAt)}</span><b>${t.method==="card"?money(t.amount):"Nhập số thực nhận"}</b></div>${t.card?`<div class="secret"><b>${esc(t.card.provider)}</b><br>Serial: ${esc(t.card.serial)}<br>Mã thẻ: ${esc(t.card.code)}<br>Khai báo: ${money(t.amount)} · Dự kiến: ${money(t.expectedCredit)}</div>`:""}${t.status==="payment_review"?`<div class="record-actions"><input class="credit-input" type="number" min="2000" step="1000" value="${t.expectedCredit||t.approvedAmount||2000}" data-credit="${t.id}"><button data-approve-topup="${t.id}">Xác nhận & cộng tiền</button><button class="danger" data-reject-topup="${t.id}">Từ chối</button></div>`:""}</article>`).join(""):`<div class="empty">Chưa có yêu cầu nạp tiền.</div>`}</div>`}
    function adminInventoryMarkup(){return `<div class="admin-grid"><form class="admin-card form" data-admin-form="inventory"><div><span class="kicker">Kho tài khoản</span><h2>Thêm sản phẩm bàn giao</h2></div><label>Sản phẩm<select name="product" id="adminProduct">${PRODUCTS.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join("")}</select></label><label>Gói<select name="plan" id="adminPlan">${PRODUCTS[0].plans.map(p=>`<option>${esc(p.name)}</option>`).join("")}</select></label><label>Tài khoản / key<input name="account" required></label><label>Mật khẩu<input name="password" required></label><label>Ghi chú<textarea name="note"></textarea></label><button class="full-btn" type="submit">Thêm vào kho</button><button class="outline-btn" type="button" data-admin-action="sync-stock">Đồng bộ số lượng công khai</button></form><div class="admin-card"><div class="admin-title"><div><span class="kicker">Tồn kho</span><h2>${state.adminInventory.filter(x=>x.status==="available").length} tài khoản sẵn có</h2></div></div>${state.adminInventory.map(i=>`<div class="inventory-row"><div><b>${esc(i.productName)}</b><small style="display:block;color:var(--muted)">${esc(i.planName)}</small></div><code>${esc(i.account)}</code><span class="status ${i.status}">${i.status==="available"?"Sẵn có":"Đã bán"}</span></div>`).join("")||`<div class="empty">Kho đang trống.</div>`}</div></div>`}
    function adminSettingsMarkup(){const s=state.settings;return `<div class="admin-grid"><form class="admin-card form" data-admin-form="settings"><div><span class="kicker">Cấu hình</span><h2>Thông tin nhận thanh toán</h2></div><label>Mã ngân hàng / BIN<input name="bankId" value="${esc(s.bankId)}" required placeholder="970436"></label><label>Tên ngân hàng<input name="bankName" value="${esc(s.bankName)}" required></label><label>Số tài khoản<input name="accountNumber" value="${esc(s.accountNumber)}" required></label><label>Tên chủ tài khoản<input name="accountName" value="${esc(s.accountName)}" required></label><label>Liên kết Zalo<input name="zaloUrl" type="url" value="${esc(s.zaloUrl)}"></label><button class="full-btn" type="submit">Lưu cấu hình</button></form><div class="admin-card" style="text-align:center"><span class="method-icon" style="margin:auto">🏦</span><p style="font-size:10px;color:var(--muted)">Thông tin đang hiển thị</p><h2>${esc(s.bankName||"Chưa cấu hình")}</h2><code style="font-size:24px;color:var(--blue)">${esc(s.accountNumber||"-")}</code><p>${esc(s.accountName||"-")}</p></div></div>`}

    function renderAdmin(){
      $("#sheetHost").innerHTML="";document.body.style.overflow="";
      if(!state.user){$("#app").innerHTML=adminLoginMarkup(false);bindAdmin();return}
      if(!state.admin){$("#app").innerHTML=adminLoginMarkup(true);bindAdmin();return}
      $("#app").innerHTML=adminShell();bindAdmin();
    }
    function bindAdmin(){
      const root=$("#app");root.onclick=adminClick;root.onsubmit=adminSubmit;root.onchange=e=>{if(e.target.id==="adminProduct"){const p=selectedProduct(e.target.value);$("#adminPlan").innerHTML=p.plans.map(x=>`<option>${esc(x.name)}</option>`).join("")}};
    }
    async function adminClick(e){
      const tab=e.target.closest("[data-admin-tab]");if(tab){state.adminTab=tab.dataset.adminTab;state.message=state.error="";renderAdmin();return}
      const a=e.target.closest("[data-admin-action]")?.dataset.adminAction;
      if(a==="logout")return signOut(auth);if(a==="retry-admin")return checkAdmin();if(a==="switch-register"){state.adminAuthMode=state.adminAuthMode==="login"?"register":"login";state.error="";renderAdmin();return}if(a==="sync-stock")return syncStock();
      const approve=e.target.closest("[data-approve-order]");if(approve)return adminApproveOrder(approve.dataset.approveOrder,false);
      const support=e.target.closest("[data-support-order]");if(support)return adminApproveOrder(support.dataset.supportOrder,true);
      const reject=e.target.closest("[data-reject-order]");if(reject)return adminRejectOrder(reject.dataset.rejectOrder);
      const at=e.target.closest("[data-approve-topup]");if(at){const input=$(`[data-credit="${at.dataset.approveTopup}"]`);return adminApproveTopup(at.dataset.approveTopup,Number(input.value))}
      const rt=e.target.closest("[data-reject-topup]");if(rt)return adminRejectTopup(rt.dataset.rejectTopup);
    }
    async function adminSubmit(e){
      e.preventDefault();const form=e.target,kind=form.dataset.adminForm;state.error=state.message="";
      try{
        if(kind==="login"){const d=new FormData(form),email=d.get("email").trim(),password=d.get("password");if(state.adminAuthMode==="register")await createUserWithEmailAndPassword(auth,email,password);else await signInWithEmailAndPassword(auth,email,password);return}
        if(kind==="inventory"){const d=new FormData(form),p=selectedProduct(d.get("product")),plan=d.get("plan");await addDoc(collection(db,"inventory"),{productId:p.id,productName:p.name,planName:plan,account:d.get("account").trim(),password:d.get("password"),note:d.get("note").trim(),status:"available",createdAt:serverTimestamp()});state.message="Đã thêm tài khoản vào kho.";await syncStock(false);return}
        if(kind==="settings"){const d=new FormData(form),data={bankId:d.get("bankId").trim(),bankName:d.get("bankName").trim(),accountNumber:d.get("accountNumber").trim(),accountName:d.get("accountName").trim().toUpperCase(),zaloUrl:d.get("zaloUrl").trim(),updatedAt:serverTimestamp()};await setDoc(doc(db,"settings","payment"),data,{merge:true});state.settings={...state.settings,...data};state.message="Đã lưu cấu hình thanh toán.";renderAdmin()}
      }catch(err){state.error=friendlyError(err);renderAdmin()}
    }
    async function checkAdmin(){
      if(!state.user){state.admin=false;renderAdmin();return}
      try{state.admin=(await getDoc(doc(db,"admins",state.user.uid))).exists();if(state.admin)subscribeAdmin();renderAdmin()}catch(err){state.admin=false;state.error=friendlyError(err);renderAdmin()}
    }
    function subscribeAdmin(){
      adminUnsubs.forEach(u=>u());adminUnsubs=[];
      adminUnsubs.push(onSnapshot(collection(db,"orders"),s=>{state.adminOrders=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));renderAdmin()},()=>{}));
      adminUnsubs.push(onSnapshot(collection(db,"topups"),s=>{state.adminTopups=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));renderAdmin()},()=>{}));
      adminUnsubs.push(onSnapshot(collection(db,"inventory"),s=>{state.adminInventory=s.docs.map(d=>({id:d.id,...d.data()}));renderAdmin()},()=>{}));
    }
    function validateOrderPricing(o){
      let total=0,count=0;for(const i of o.items||[]){const p=selectedProduct(i.productId),plan=p?.plans.find(x=>x.name===i.planName);if(!p||!plan||i.productName!==p.name||i.unitPrice!==plan.price||i.lineTotal!==plan.price*i.quantity||i.quantity<1)throw Error("Dữ liệu giá của đơn không hợp lệ.");total+=i.lineTotal;count+=i.quantity}if(total!==o.total||count!==o.itemCount)throw Error("Tổng tiền của đơn không hợp lệ.");return total
    }
    async function adminApproveOrder(id,support){
      state.error=state.message="";
      try{
        const o=state.adminOrders.find(x=>x.id===id);if(!o)throw Error("Không tìm thấy đơn.");const total=validateOrderPricing(o),chosen=[],delivery=[];
        for(const item of o.items){
          if(support){delivery.push({productName:item.productName,planName:item.planName,type:"support",note:`Liên hệ admin và cung cấp mã đơn ${o.orderCode} để được hỗ trợ bàn giao.`});continue}
          const available=state.adminInventory.filter(x=>x.status==="available"&&x.productId===item.productId&&x.planName===item.planName&&!chosen.some(c=>c.id===x.id));if(available.length<item.quantity)throw Error(`Kho thiếu ${item.productName} - ${item.planName}.`);
          for(const inv of available.slice(0,item.quantity)){chosen.push(inv);delivery.push({productName:item.productName,planName:item.planName,type:"credential",account:inv.account,password:inv.password,note:inv.note||"Đổi mật khẩu sau khi đăng nhập nếu sản phẩm cho phép."})}
        }
        const orderRef=doc(db,"orders",id),walletRef=doc(db,"wallets",o.userId),invRefs=chosen.map(x=>doc(db,"inventory",x.id));
        await runTransaction(db,async tx=>{
          const os=await tx.get(orderRef);if(!os.exists()||os.data().status!=="payment_review")throw Error("Đơn đã được xử lý.");
          if(o.paymentMethod==="balance"){const ws=await tx.get(walletRef),bal=ws.exists()?Number(ws.data().balance)||0:0;if(bal<total)throw Error("Số dư khách hàng không đủ.");tx.set(walletRef,{balance:bal-total,updatedAt:serverTimestamp()},{merge:true})}
          for(const r of invRefs){const s=await tx.get(r);if(!s.exists()||s.data().status!=="available")throw Error("Một tài khoản trong kho vừa được dùng.");tx.update(r,{status:"sold",orderId:id,soldAt:serverTimestamp()})}
          tx.update(orderRef,{status:"fulfilled",delivery,paidAt:serverTimestamp(),fulfilledAt:serverTimestamp(),updatedAt:serverTimestamp()});
        });
        state.message="Đã duyệt và bàn giao đơn hàng.";await syncStock(false);renderAdmin();
      }catch(err){state.error=friendlyError(err);renderAdmin()}
    }
    async function adminRejectOrder(id){try{await updateDoc(doc(db,"orders",id),{status:"rejected",rejectionReason:"Không xác minh được thanh toán.",updatedAt:serverTimestamp()});state.message="Đã từ chối đơn.";renderAdmin()}catch(err){state.error=friendlyError(err);renderAdmin()}}
    async function adminApproveTopup(id,amount){
      if(!Number.isInteger(amount)||amount<2000){state.error="Số tiền cộng tối thiểu 2.000đ.";renderAdmin();return}
      try{const ref=doc(db,"topups",id);await runTransaction(db,async tx=>{const s=await tx.get(ref);if(!s.exists()||s.data().status!=="payment_review")throw Error("Yêu cầu đã được xử lý.");const wallet=doc(db,"wallets",s.data().userId),ws=await tx.get(wallet),bal=ws.exists()?Number(ws.data().balance)||0:0;tx.set(wallet,{balance:bal+amount,updatedAt:serverTimestamp()},{merge:true});tx.update(ref,{status:"approved",approvedAmount:amount,approvedAt:serverTimestamp(),updatedAt:serverTimestamp()})});state.message="Đã cộng số dư cho khách.";renderAdmin()}catch(err){state.error=friendlyError(err);renderAdmin()}
    }
    async function adminRejectTopup(id){try{await updateDoc(doc(db,"topups",id),{status:"rejected",rejectionReason:"Không xác minh được giao dịch.",updatedAt:serverTimestamp()});state.message="Đã từ chối yêu cầu.";renderAdmin()}catch(err){state.error=friendlyError(err);renderAdmin()}}
    async function syncStock(show=true){
      try{const batch=writeBatch(db),available=state.adminInventory.filter(x=>x.status==="available");for(const p of PRODUCTS)for(const plan of p.plans){const count=available.filter(x=>x.productId===p.id&&x.planName===plan.name).length;batch.set(doc(db,"stock",stockId(p.id,plan.name)),{productId:p.id,productName:p.name,planName:plan.name,count,updatedAt:serverTimestamp()},{merge:true})}await batch.commit();if(show){state.message="Đã đồng bộ số lượng tồn kho công khai.";renderAdmin()}}catch(err){state.error=friendlyError(err);renderAdmin()}
    }

    subscribePublic();
    onAuthStateChanged(auth,async user=>{
      state.user=user||null;subscribeUser(user);
      if(isAdminPage){await checkAdmin()}else{if(!$("#app").children.length)renderStore();else updateHeader();if(state.sheet==="auth"&&user){const after=state.payload?.after||"cart";openSheet(after)}}
    });
    if(!isAdminPage)renderStore();else renderAdmin();
  </script>
</body>
</html>
