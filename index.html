    async function sheetClick(e){
      const a=e.target.closest("[data-sheet-action]")?.dataset.sheetAction;
      if(a){e.preventDefault();await sheetAction(a,e.target.closest("[data-sheet-action]"));return}
      const qty=e.target.closest("[data-qty]");if(qty){
        const item=state.cart.find(i=>i.key===qty.dataset.key);
        if(item){
          const delta=Number(qty.dataset.qty)||0,max=state.stockLoaded&&!state.stockError?Math.max(0,stockCount(item.product,item.plan)):10;
          if(delta>0){if(max>item.quantity)item.quantity=Math.min(max,item.quantity+delta)}else item.quantity=Math.max(0,item.quantity+delta);
          if(item.quantity<=0)state.cart=state.cart.filter(i=>i!==item);
          saveCart();renderSheet({preserve:true});updateHeader();
        }
        return
      }
      const rem=e.target.closest("[data-remove]");if(rem){state.cart=state.cart.filter(i=>i.key!==rem.dataset.remove);saveCart();renderSheet({preserve:true});updateHeader();return}
      const order=e.target.closest("[data-order]");if(order){const o=state.orders.find(x=>x.id===order.dataset.order);openSheet("orderDetail",o);return}
      const resume=e.target.closest("[data-resume-bank]");if(resume){const o=state.orders.find(x=>x.id===resume.dataset.resumeBank);openSheet("orderBank",o)}
    }

      if(a==="go-home"){closeSheet();setTimeout(()=>$("#top")?.scrollIntoView({behavior:"smooth"}),300);return}
      if(a==="go-products"){closeSheet();setTimeout(()=>$("#products")?.scrollIntoView({behavior:"smooth"}),300);return}
      if(a==="topup")return state.user?openSheet("topup"):openSheet("auth",{after:"topup"});
      if(a==="orders")return state.user?openSheet("orders"):openSheet("auth",{after:"orders"});
      if(a==="toggle-auth"){const form=$("[data-form=auth]");const btn=$("[data-mode]",form);const login=btn.dataset.mode==="login";btn.dataset.mode=login?"register":"login";btn.textContent=login?"Đăng ký":"Đăng nhập";el.textContent=login?"Đã có tài khoản? Đăng nhập":"Chưa có tài khoản? Đăng ký";$("#authTitle").textContent=login?"Tạo tài khoản NovaKey":"Đăng nhập để tiếp tục";return}
      if(a==="checkout"){if(!state.user)return openSheet("auth",{after:"payment"});return openSheet("payment")}
      if(a==="back-cart")return openSheet("cart");
      if(a==="back-payment")return openSheet("payment");
      if(a==="back-topup")return openSheet("topup");
      if(a==="back-orders")return openSheet("orders");
      if(a==="open-bank-topup")return openSheet("bankTopup");
      if(a==="open-card-topup")return openSheet("cardTopup",{face:100000});
      if(a==="pay-bank")return guarded(()=>createOrder("bank"));
      if(a==="pay-card")return openSheet("orderCard",{face:100000});
      if(a==="pay-balance")return guarded(()=>createOrder("balance"));
      if(a==="confirm-bank-topup")return guarded(()=>confirmBankTopup(el));
      if(a==="confirm-order-bank")return guarded(()=>confirmOrderBank(el.dataset.orderId));
      if(a==="logout"){await signOut(auth);closeSheet();return}
    }
    function sheetChange(e){
      if(e.target.id!=="cardFace"&&e.target.id!=="orderCardFace")return;
      const face=Number(e.target.value),rate=CARD_RATES.find(x=>x.face===face);
      state.payload={...(state.payload||{}),face};
      const preview=e.target.closest("form")?.querySelector(".receive-box strong");
      if(preview&&rate)preview.textContent=money(rate.receive);
    }
    async function sheetSubmit(e){
      e.preventDefault();if(state.busy)return;const form=e.target,kind=form.dataset.form;state.error="";state.message="";
      await guarded(async()=>{
        try{
          if(kind==="auth"){
            const data=new FormData(form),mode=$("[data-mode]",form).dataset.mode,email=String(data.get("email")||"").trim(),password=String(data.get("password")||"");
            if(mode==="register")await createUserWithEmailAndPassword(auth,email,password);else await signInWithEmailAndPassword(auth,email,password);
            const after=state.payload?.after||"cart";openSheet(after);return;
          }
          if(kind==="card-topup")return submitCardTopup(form);
          if(kind==="order-card")return submitOrderCard(form);
        }catch(err){console.error(err);state.error=friendlyError(err);renderSheet()}
      });
    }
    function friendlyError(err){const c=err?.code||"";if(c.includes("invalid-credential"))return"Email hoặc mật khẩu không đúng.";if(c.includes("email-already"))return"Email này đã được sử dụng.";if(c.includes("permission-denied"))return"Firebase Rules chưa cho phép thao tác này.";if(c.includes("network")||c.includes("unavailable"))return"Kết nối mạng không ổn định, vui lòng thử lại.";return err?.message||"Không thể hoàn tất thao tác, vui lòng thử lại."}

    function orderPayload(method,card=null){
      const items=state.cart.map(i=>({productId:i.product.id,productName:i.product.name,planName:i.plan.name,unitPrice:i.plan.price,quantity:i.quantity,lineTotal:i.plan.price*i.quantity}));
      return {userId:state.user.uid,customerEmail:state.user.email||"",paymentMethod:method,items,itemCount:cartCount(),total:cartTotal(),status:method==="bank"?"awaiting_payment":"payment_review",card,delivery:[],rejectionReason:"",createdAt:serverTimestamp(),updatedAt:serverTimestamp()}
    }
    function validateCart(){
      if(!state.cart.length)throw Error("Giỏ hàng đang trống.");
      if(state.stockError)throw Error("Không thể kiểm tra kho lúc này, vui lòng thử lại sau.");
      if(!state.stockLoaded)throw Error("Kho hàng vẫn đang tải, vui lòng đợi vài giây.");
      for(const i of state.cart){const count=stockCount(i.product,i.plan);if(state.stockLoaded&&count<i.quantity)throw Error(`${i.product.name} - ${i.plan.name} chỉ còn ${count} tài khoản.`)}
    }
    async function createOrder(method,card=null){
      try{
        if(!state.user)return openSheet("auth",{after:"payment"});validateCart();
        if(method==="balance"&&state.balance<cartTotal())throw Error(`Số dư còn thiếu ${money(cartTotal()-state.balance)}.`);
        const ref=doc(collection(db,"orders")),code=`NVK-${ref.id.slice(0,8).toUpperCase()}`;
        const data={...orderPayload(method,card),orderCode:code};await setDoc(ref,data);
        const o={id:ref.id,...data,createdAt:null};
        if(method==="bank")openSheet("orderBank",o);else{state.cart=[];saveCart();updateHeader();openSheet("orderDetail",{...o,status:"payment_review"});state.message="Đơn đã được gửi và đang chờ duyệt."}
      }catch(err){state.error=friendlyError(err);renderSheet()}
    }
    async function confirmOrderBank(id){
      try{await updateDoc(doc(db,"orders",id),{status:"payment_review",updatedAt:serverTimestamp()});state.cart=[];saveCart();updateHeader();const o=state.orders.find(x=>x.id===id)||state.payload;openSheet("orderDetail",{...o,status:"payment_review"});state.message="Đã ghi nhận, đơn đang chờ đối soát.";renderSheet()}catch(err){state.error=friendlyError(err);renderSheet()}
    }
    async function submitOrderCard(form){
      const d=new FormData(form),face=Number(d.get("face")),rate=CARD_RATES.find(x=>x.face===face);if(!rate)throw Error("Mệnh giá không hợp lệ.");
      const serial=d.get("serial").trim(),pin=d.get("pin").trim();if(serial.length<6||pin.length<6)throw Error("Vui lòng nhập đúng serial và mã thẻ.");
      await createOrder("card",{provider:d.get("provider"),serial,code:pin,declaredAmount:face,expectedCredit:rate.receive});
    }
    async function confirmBankTopup(){
      try{
        const ref=doc(collection(db,"topups"));await setDoc(ref,{userId:state.user.uid,customerEmail:state.user.email||"",reference:userBankContent(),method:"bank",amount:0,minimumAmount:2000,approvedAmount:0,status:"payment_review",createdAt:serverTimestamp(),updatedAt:serverTimestamp()});
        openSheet("topup");state.message="Đã ghi nhận yêu cầu. Hệ thống sẽ đối soát theo nội dung chuyển tiền riêng.";renderSheet();
      }catch(err){state.error=friendlyError(err);renderSheet()}
    }
    async function submitCardTopup(form){
      const d=new FormData(form),face=Number(d.get("face")),rate=CARD_RATES.find(x=>x.face===face);if(!rate)throw Error("Mệnh giá không hợp lệ.");
      const serial=d.get("serial").trim(),pin=d.get("pin").trim();if(serial.length<6||pin.length<6)throw Error("Vui lòng nhập đúng serial và mã thẻ.");
      const ref=doc(collection(db,"topups")),reference=`THE-${ref.id.slice(0,8).toUpperCase()}`;
      await setDoc(ref,{userId:state.user.uid,customerEmail:state.user.email||"",reference,method:"card",amount:face,expectedCredit:rate.receive,approvedAmount:0,status:"payment_review",card:{provider:d.get("provider"),serial,code:pin,declaredAmount:face},createdAt:serverTimestamp(),updatedAt:serverTimestamp()});
      openSheet("topup");state.message=`Đã gửi thẻ, số tiền dự kiến nhận ${money(rate.receive)}.`;renderSheet();
    }

    function enableSwipe(sheet,layer,side="right"){

      let frame=0,samples=[],suppressClickUntil=0;

      const transformFor=value=>vertical?`translate3d(0,${value}px,0)`:`translate3d(${direction*value}px,0,0)`;
      const clearInline=()=>{
        sheet.style.removeProperty("transition");sheet.style.removeProperty("transform");sheet.style.removeProperty("pointer-events");

      };

      const detachTouch=()=>{window.removeEventListener("touchmove",onTouchMove,true);window.removeEventListener("touchend",onTouchEnd,true);window.removeEventListener("touchcancel",onTouchCancel,true)};

      const velocity=()=>{const first=samples[0],last=samples[samples.length-1];return first&&last&&last.t>first.t?(last.x-first.x)/(last.t-first.t):0};
      const settle=(shouldClose,speed=0)=>{

        else{const token=sheetMotionToken;setTimeout(()=>{if(token!==sheetMotionToken||!state.sheet)return;clearInline();layer.classList.remove("sheet-closing");layer.classList.add("sheet-visible")},duration+25)}

      const move=(primary,secondary,event)=>{if(!tracking)return;const dp=primary-startPrimary,ds=secondary-startSecondary,ap=Math.abs(dp),as=Math.abs(ds);if(!dragging){if(Math.hypot(dp,ds)<6)return;if(as>12&&as>ap*1.35){clearDragState();clearInline();return}if(ap<as*.72)return;if(vertical&&dp<0){clearDragState();clearInline();return}dragging=true;suppressClickUntil=performance.now()+450;sheet.classList.add("is-dragging");layer.classList.add("is-dragging");document.body.style.userSelect="none";document.body.style.webkitUserSelect="none"}event?.preventDefault?.();const next=startOffset+(vertical?dp:direction*dp);setPosition(next);record(clamp(next))};

      sheet.addEventListener("touchstart",e=>{if(e.touches.length!==1||e.target.closest("input,textarea,select")||vertical&&e.target.closest(".sheet-body")?.scrollTop>0)return;const touch=e.touches[0];lastTouchAt=performance.now();if(!begin(vertical?touch.clientY:touch.clientX,vertical?touch.clientX:touch.clientY))return;activeTouchId=touch.identifier;window.addEventListener("touchmove",onTouchMove,{capture:true,passive:false});window.addEventListener("touchend",onTouchEnd,{capture:true,passive:true});window.addEventListener("touchcancel",onTouchCancel,{capture:true,passive:true})},{passive:true});

    }

    function clearUserSubs(){[unsubWallet,unsubOrders,unsubTopups].forEach(u=>u?.());unsubWallet=unsubOrders=unsubTopups=null;state.balance=0;state.orders=[];state.topups=[]}
    function subscribePublic(){
      unsubSettings=onSnapshot(doc(db,"settings","payment"),s=>{state.settings=s.exists()?{...defaultSettings,...s.data()}:{...defaultSettings};if(state.sheet==="bankTopup"||state.sheet==="orderBank")renderSheet();if(isAdminPage&&state.admin&&state.adminTab==="settings")renderAdmin()},()=>{});
      unsubStock=onSnapshot(collection(db,"stock"),snap=>{state.stock.clear();snap.forEach(d=>{const x=d.data();state.stock.set(`${x.productId}|${x.planName}`,Number(x.count)||0)});state.stockLoaded=true;state.stockError=false;if(!isAdminPage){updateAllProductCards();queueProductRefresh(false)}},err=>{console.warn(err);state.stockLoaded=false;state.stockError=true;if(!isAdminPage){updateAllProductCards();queueProductRefresh(false)}});
    }
    function subscribeUser(user){
      clearUserSubs();if(!user){updateHeader();return}
      unsubWallet=onSnapshot(doc(db,"wallets",user.uid),s=>{state.balance=s.exists()?Number(s.data().balance)||0:0;updateHeader();if(state.sheet==="topup"||state.sheet==="payment")renderSheet()},()=>{});
      unsubOrders=onSnapshot(query(collection(db,"orders"),where("userId","==",user.uid)),snap=>{state.orders=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));if(["orders","orderDetail"].includes(state.sheet))renderSheet()},()=>{});
      unsubTopups=onSnapshot(query(collection(db,"topups"),where("userId","==",user.uid)),snap=>{state.topups=snap.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));if(state.sheet==="topup")renderSheet()},()=>{});
    }

    function adminLoginMarkup(knownUser=false){const register=state.adminAuthMode==="register";return `<main class="admin-login-wrap"><section class="admin-login"><a class="brand" href="./"><span class="brand-mark">N</span><span>NovaKey</span></a><span class="kicker">Quản trị cửa hàng</span><h1>${knownUser?"Tài khoản chưa có quyền admin":register?"Tạo tài khoản admin":"Đăng nhập admin"}</h1>${knownUser?`<p style="font-size:11px;color:var(--muted);line-height:1.6">Tạo document trong collection <b>admins</b> với ID đúng bằng UID:</p><code class="uid">${esc(state.user.uid)}</code>${feedback()}<button class="full-btn" data-admin-action="retry-admin">Tôi đã tạo, kiểm tra lại</button><button class="outline-btn" data-admin-action="logout">Đăng xuất</button>`:`<form class="form" data-admin-form="login"><label>Email<input name="email" type="email" required></label><label>Mật khẩu<input name="password" type="password" minlength="6" required></label>${feedback()}<button class="full-btn" type="submit">${register?"Đăng ký":"Đăng nhập"}</button><button class="outline-btn" type="button" data-admin-action="switch-register">${register?"Đã có tài khoản? Đăng nhập":"Chưa có tài khoản? Đăng ký"}</button></form>`}<a class="back" href="./" style="display:block;margin-top:14px">← Quay lại cửa hàng</a></section></main>`}

    function adminOrdersMarkup(){return `<div class="admin-title"><div><span class="kicker">Đơn hàng</span><h1>Đối soát và giao sản phẩm</h1></div><small>${state.adminOrders.length} đơn gần nhất</small></div><div class="admin-list">${state.adminOrders.length?state.adminOrders.map(o=>`<article class="admin-record"><div class="admin-record-head"><div><strong>${esc(o.orderCode)}</strong><small>${esc(o.customerEmail||o.userId)}</small></div><span class="status ${o.status}">${STATUS[o.status]||esc(o.status)}</span></div><div class="record-meta"><span>${o.paymentMethod==="bank"?"Ngân hàng":o.paymentMethod==="card"?"Thẻ cào":"Số dư"}</span><span>${time(o.createdAt)}</span><b>${money(o.total)}</b></div><div class="record-items">${(o.items||[]).map(i=>`<div>${esc(i.productName)} · ${esc(i.planName)} × ${i.quantity} — ${money(i.lineTotal)}</div>`).join("")}</div>${o.card?`<div class="secret"><b>${esc(o.card.provider)}</b><br>Serial: ${esc(o.card.serial)}<br>Mã thẻ: ${esc(o.card.code)}<br>Mệnh giá khai báo: ${money(o.card.declaredAmount||0)} · Dự kiến nhận: ${money(o.card.expectedCredit||0)}</div>`:""}${o.status==="payment_review"?`<div class="record-actions"><button data-approve-order="${o.id}">Duyệt & giao từ kho</button><button class="secondary-admin" data-support-order="${o.id}">Giao hỗ trợ</button><button class="danger" data-reject-order="${o.id}">Từ chối</button></div>`:""}</article>`).join(""):`<div class="empty">Chưa có đơn hàng.</div>`}</div>`}
    function adminTopupsMarkup(){return `<div class="admin-title"><div><span class="kicker">Nạp số dư</span><h1>Duyệt ngân hàng và thẻ cào</h1></div></div><div class="admin-list">${state.adminTopups.length?state.adminTopups.map(t=>`<article class="admin-record"><div class="admin-record-head"><div><strong>${esc(t.reference)}</strong><small>${esc(t.customerEmail||t.userId)}</small></div><span class="status ${t.status}">${STATUS[t.status]||esc(t.status)}</span></div><div class="record-meta"><span>${t.method==="bank"?"Chuyển khoản":"Thẻ cào"}</span><span>${time(t.createdAt)}</span><b>${t.method==="card"?money(t.amount):"Nhập số thực nhận"}</b></div>${t.card?`<div class="secret"><b>${esc(t.card.provider)}</b><br>Serial: ${esc(t.card.serial)}<br>Mã thẻ: ${esc(t.card.code)}<br>Khai báo: ${money(t.amount)} · Dự kiến: ${money(t.expectedCredit)}</div>`:""}${t.status==="payment_review"?`<div class="record-actions"><input class="credit-input" type="number" min="2000" step="1000" value="${t.expectedCredit||t.approvedAmount||2000}" data-credit="${t.id}"><button data-approve-topup="${t.id}">Xác nhận & cộng tiền</button><button class="danger" data-reject-topup="${t.id}">Từ chối</button></div>`:""}</article>`).join(""):`<div class="empty">Chưa có yêu cầu nạp tiền.</div>`}</div>`}
    function adminInventoryMarkup(){return `<div class="admin-grid"><form class="admin-card form" data-admin-form="inventory"><div><span class="kicker">Kho tài khoản</span><h2>Thêm sản phẩm bàn giao</h2></div><label>Sản phẩm<select name="product" id="adminProduct">${PRODUCTS.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join("")}</select></label><label>Gói<select name="plan" id="adminPlan">${PRODUCTS[0].plans.map(p=>`<option>${esc(p.name)}</option>`).join("")}</select></label><label>Tài khoản / key<input name="account" required></label><label>Mật khẩu<input name="password" required></label><label>Ghi chú<textarea name="note"></textarea></label><button class="full-btn" type="submit">Thêm vào kho</button><button class="outline-btn" type="button" data-admin-action="sync-stock">Đồng bộ số lượng công khai</button></form><div class="admin-card"><div class="admin-title"><div><span class="kicker">Tồn kho</span><h2>${state.adminInventory.filter(x=>x.status==="available").length} tài khoản sẵn có</h2></div></div>${state.adminInventory.map(i=>`<div class="inventory-row"><div><b>${esc(i.productName)}</b><small style="display:block;color:var(--muted)">${esc(i.planName)}</small></div><code>${esc(i.account)}</code><span class="status ${i.status}">${i.status==="available"?"Sẵn có":"Đã bán"}</span></div>`).join("")||`<div class="empty">Kho đang trống.</div>`}</div></div>`}
    function adminSettingsMarkup(){const s=state.settings;return `<div class="admin-grid"><form class="admin-card form" data-admin-form="settings"><div><span class="kicker">Cấu hình</span><h2>Thông tin nhận thanh toán</h2></div><label>Mã ngân hàng / BIN<input name="bankId" value="${esc(s.bankId)}" required placeholder="970436"></label><label>Tên ngân hàng<input name="bankName" value="${esc(s.bankName)}" required></label><label>Số tài khoản<input name="accountNumber" value="${esc(s.accountNumber)}" required></label><label>Tên chủ tài khoản<input name="accountName" value="${esc(s.accountName)}" required></label><label>Liên kết Zalo<input name="zaloUrl" type="url" value="${esc(s.zaloUrl)}"></label><button class="full-btn" type="submit">Lưu cấu hình</button></form><div class="admin-card" style="text-align:center"><span class="method-icon" style="margin:auto">🏦</span><p style="font-size:10px;color:var(--muted)">Thông tin đang hiển thị</p><h2>${esc(s.bankName||"Chưa cấu hình")}</h2><code style="font-size:24px;color:var(--blue)">${esc(s.accountNumber||"-")}</code><p>${esc(s.accountName||"-")}</p></div></div>`}

    function renderAdmin(){
      $("#sheetHost").innerHTML="";document.body.style.overflow="";
      if(!state.user){$("#app").innerHTML=adminLoginMarkup(false);bindAdmin();return}
      if(!state.admin){$("#app").innerHTML=adminLoginMarkup(true);bindAdmin();return}
      $("#app").innerHTML=adminShell();bindAdmin();
    }
    function bindAdmin(){
      const root=$("#app");root.onclick=adminClick;root.onsubmit=adminSubmit;root.onchange=e=>{if(e.target.id==="adminProduct"){const p=selectedProduct(e.target.value);$("#adminPlan").innerHTML=p.plans.map(x=>`<option>${esc(x.name)}</option>`).join("")}};
    }
    async function adminClick(e){
      const tab=e.target.closest("[data-admin-tab]");if(tab){state.adminTab=tab.dataset.adminTab;state.message=state.error="";renderAdmin();return}
      const a=e.target.closest("[data-admin-action]")?.dataset.adminAction;
      if(a==="logout")return guarded(()=>signOut(auth));if(a==="retry-admin")return guarded(checkAdmin);if(a==="switch-register"){state.adminAuthMode=state.adminAuthMode==="login"?"register":"login";state.error="";renderAdmin();return}if(a==="sync-stock")return guarded(syncStock);
      const approve=e.target.closest("[data-approve-order]");if(approve)return guarded(()=>adminApproveOrder(approve.dataset.approveOrder,false));
      const support=e.target.closest("[data-support-order]");if(support)return guarded(()=>adminApproveOrder(support.dataset.supportOrder,true));
      const reject=e.target.closest("[data-reject-order]");if(reject)return guarded(()=>adminRejectOrder(reject.dataset.rejectOrder));
      const at=e.target.closest("[data-approve-topup]");if(at){const input=$(`[data-credit="${at.dataset.approveTopup}"]`);return guarded(()=>adminApproveTopup(at.dataset.approveTopup,Number(input.value)))}
      const rt=e.target.closest("[data-reject-topup]");if(rt)return guarded(()=>adminRejectTopup(rt.dataset.rejectTopup));
    }
    async function adminSubmit(e){
      e.preventDefault();if(state.busy)return;const form=e.target,kind=form.dataset.adminForm;state.error=state.message="";
      await guarded(async()=>{
        try{
          if(kind==="login"){const d=new FormData(form),email=String(d.get("email")||"").trim(),password=String(d.get("password")||"");if(state.adminAuthMode==="register")await createUserWithEmailAndPassword(auth,email,password);else await signInWithEmailAndPassword(auth,email,password);return}
          if(kind==="inventory"){const d=new FormData(form),p=selectedProduct(d.get("product")),plan=d.get("plan");await addDoc(collection(db,"inventory"),{productId:p.id,productName:p.name,planName:plan,account:String(d.get("account")||"").trim(),password:String(d.get("password")||""),note:String(d.get("note")||"").trim(),status:"available",createdAt:serverTimestamp()});state.message="Đã thêm tài khoản vào kho.";await syncStock(false);return}
          if(kind==="settings"){const d=new FormData(form),data={bankId:String(d.get("bankId")||"").trim(),bankName:String(d.get("bankName")||"").trim(),accountNumber:String(d.get("accountNumber")||"").trim(),accountName:String(d.get("accountName")||"").trim().toUpperCase(),zaloUrl:String(d.get("zaloUrl")||"").trim(),updatedAt:serverTimestamp()};await setDoc(doc(db,"settings","payment"),data,{merge:true});state.settings={...state.settings,...data};state.message="Đã lưu cấu hình thanh toán.";renderAdmin()}
        }catch(err){state.error=friendlyError(err);renderAdmin()}
      });
    }
    async function checkAdmin(){
      if(!state.user){state.admin=false;renderAdmin();return}
      try{state.admin=(await getDoc(doc(db,"admins",state.user.uid))).exists();if(state.admin)subscribeAdmin();renderAdmin()}catch(err){state.admin=false;state.error=friendlyError(err);renderAdmin()}
    }
    function queueAdminRender(){cancelAnimationFrame(adminRenderFrame);adminRenderFrame=requestAnimationFrame(renderAdmin)}
    function subscribeAdmin(){
      adminUnsubs.forEach(u=>u());adminUnsubs=[];
      adminUnsubs.push(onSnapshot(collection(db,"orders"),s=>{state.adminOrders=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));queueAdminRender()},()=>{}));
      adminUnsubs.push(onSnapshot(collection(db,"topups"),s=>{state.adminTopups=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));queueAdminRender()},()=>{}));
      adminUnsubs.push(onSnapshot(collection(db,"inventory"),s=>{state.adminInventory=s.docs.map(d=>({id:d.id,...d.data()}));queueAdminRender()},()=>{}));
    }
    function validateOrderPricing(o){
      let total=0,count=0;for(const i of o.items||[]){const p=selectedProduct(i.productId),plan=p?.plans.find(x=>x.name===i.planName);if(!p||!plan||i.productName!==p.name||i.unitPrice!==plan.price||i.lineTotal!==plan.price*i.quantity||i.quantity<1)throw Error("Dữ liệu giá của đơn không hợp lệ.");total+=i.lineTotal;count+=i.quantity}if(total!==o.total||count!==o.itemCount)throw Error("Tổng tiền của đơn không hợp lệ.");return total
    }
    async function adminApproveOrder(id,support){
      state.error=state.message="";
      try{
        const o=state.adminOrders.find(x=>x.id===id);if(!o)throw Error("Không tìm thấy đơn.");const total=validateOrderPricing(o),chosen=[],delivery=[];
        for(const item of o.items){
          if(support){delivery.push({productName:item.productName,planName:item.planName,type:"support",note:`Liên hệ admin và cung cấp mã đơn ${o.orderCode} để được hỗ trợ bàn giao.`});continue}
          const available=state.adminInventory.filter(x=>x.status==="available"&&x.productId===item.productId&&x.planName===item.planName&&!chosen.some(c=>c.id===x.id));if(available.length<item.quantity)throw Error(`Kho thiếu ${item.productName} - ${item.planName}.`);
          for(const inv of available.slice(0,item.quantity)){chosen.push(inv);delivery.push({productName:item.productName,planName:item.planName,type:"credential",account:inv.account,password:inv.password,note:inv.note||"Đổi mật khẩu sau khi đăng nhập nếu sản phẩm cho phép."})}
        }
        const orderRef=doc(db,"orders",id),walletRef=doc(db,"wallets",o.userId),invRefs=chosen.map(x=>doc(db,"inventory",x.id));
        await runTransaction(db,async tx=>{
          const os=await tx.get(orderRef);if(!os.exists()||os.data().status!=="payment_review")throw Error("Đơn đã được xử lý.");
          if(o.paymentMethod==="balance"){const ws=await tx.get(walletRef),bal=ws.exists()?Number(ws.data().balance)||0:0;if(bal<total)throw Error("Số dư khách hàng không đủ.");tx.set(walletRef,{balance:bal-total,updatedAt:serverTimestamp()},{merge:true})}
          for(const r of invRefs){const s=await tx.get(r);if(!s.exists()||s.data().status!=="available")throw Error("Một tài khoản trong kho vừa được dùng.");tx.update(r,{status:"sold",orderId:id,soldAt:serverTimestamp()})}
          tx.update(orderRef,{status:"fulfilled",delivery,paidAt:serverTimestamp(),fulfilledAt:serverTimestamp(),updatedAt:serverTimestamp()});
        });
        state.message="Đã duyệt và bàn giao đơn hàng.";await syncStock(false);renderAdmin();
      }catch(err){state.error=friendlyError(err);renderAdmin()}
    }
    async function adminRejectOrder(id){try{await updateDoc(doc(db,"orders",id),{status:"rejected",rejectionReason:"Không xác minh được thanh toán.",updatedAt:serverTimestamp()});state.message="Đã từ chối đơn.";renderAdmin()}catch(err){state.error=friendlyError(err);renderAdmin()}}
    async function adminApproveTopup(id,amount){
      if(!Number.isInteger(amount)||amount<2000){state.error="Số tiền cộng tối thiểu 2.000đ.";renderAdmin();return}
      try{const ref=doc(db,"topups",id);await runTransaction(db,async tx=>{const s=await tx.get(ref);if(!s.exists()||s.data().status!=="payment_review")throw Error("Yêu cầu đã được xử lý.");const wallet=doc(db,"wallets",s.data().userId),ws=await tx.get(wallet),bal=ws.exists()?Number(ws.data().balance)||0:0;tx.set(wallet,{balance:bal+amount,updatedAt:serverTimestamp()},{merge:true});tx.update(ref,{status:"approved",approvedAmount:amount,approvedAt:serverTimestamp(),updatedAt:serverTimestamp()})});state.message="Đã cộng số dư cho khách.";renderAdmin()}catch(err){state.error=friendlyError(err);renderAdmin()}
    }
    async function adminRejectTopup(id){try{await updateDoc(doc(db,"topups",id),{status:"rejected",rejectionReason:"Không xác minh được giao dịch.",updatedAt:serverTimestamp()});state.message="Đã từ chối yêu cầu.";renderAdmin()}catch(err){state.error=friendlyError(err);renderAdmin()}}
    async function syncStock(show=true){
      try{
        const inventorySnap=await getDocs(collection(db,"inventory"));
        const available=inventorySnap.docs.map(d=>({id:d.id,...d.data()})).filter(x=>x.status==="available"),batch=writeBatch(db);
        for(const p of PRODUCTS)for(const plan of p.plans){const count=available.filter(x=>x.productId===p.id&&x.planName===plan.name).length;batch.set(doc(db,"stock",stockId(p.id,plan.name)),{productId:p.id,productName:p.name,planName:plan.name,count,updatedAt:serverTimestamp()},{merge:true})}
        await batch.commit();if(show){state.message="Đã đồng bộ số lượng tồn kho công khai.";renderAdmin()}
      }catch(err){state.error=friendlyError(err);renderAdmin()}
    }

    restoreCart();
    subscribePublic();
    onAuthStateChanged(auth,async user=>{
      state.user=user||null;subscribeUser(user);
      if(isAdminPage){await checkAdmin()}else{if(!$("#app").children.length)renderStore();else updateHeader();if(state.sheet==="auth"&&user){const after=state.payload?.after||"cart";openSheet(after)}}
    });
    if(!isAdminPage)renderStore();else renderAdmin();
  </script>
</body>
</html>
