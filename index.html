    function couponEligibleSubtotal(coupon=state.coupon){
      if(!coupon)return 0;
      const ids=Array.isArray(coupon.productIds)?coupon.productIds.filter(Boolean):[];
      return state.cart.reduce((sum,item)=>sum+(!ids.length||ids.includes(item.product.id)?item.plan.price*item.quantity:0),0)
    }
    function couponDiscount(coupon=state.coupon){
      if(!coupon||coupon.active===false||cartTotal()<Number(coupon.minOrder||0))return 0;
      const eligible=couponEligibleSubtotal(coupon);if(eligible<=0)return 0;
      let amount=coupon.type==="fixed"?Number(coupon.value||0):Math.floor(eligible*Math.max(0,Number(coupon.value||0))/100);
      const cap=Number(coupon.maxDiscount||0);if(cap>0)amount=Math.min(amount,cap);
      return Math.max(0,Math.min(eligible,Math.floor(amount)))
    }
    function cartPayable(){return Math.max(0,cartTotal()-couponDiscount())}
    function normalizeCode(value){return String(value||"").trim().toUpperCase().replace(/\s+/g,"")}
    function couponLabel(coupon=state.coupon){if(!coupon)return"";return coupon.type==="fixed"?`Giảm ${money(coupon.value)}`:`Giảm ${Number(coupon.value)||0}%${Number(coupon.maxDiscount||0)>0?` · tối đa ${money(coupon.maxDiscount)}`:""}`}

    function selectedProduct(id){return PRODUCTS.find(p=>p.id===id)}
    function saveCart(){
      try{localStorage.setItem(CART_STORAGE_KEY,JSON.stringify(state.cart.map(i=>({productId:i.product.id,planName:i.plan.name,quantity:i.quantity}))))}catch{}
    }
    function restoreCart(){
      try{
        const rows=JSON.parse(localStorage.getItem(CART_STORAGE_KEY)||"[]");
        state.cart=(Array.isArray(rows)?rows:[]).flatMap(row=>{
          const product=selectedProduct(row.productId),plan=product?.plans.find(x=>x.name===row.planName),quantity=Math.max(1,Math.min(10,Number(row.quantity)||1));
          return product&&plan?[{key:`${product.id}|${plan.name}`,product,plan,quantity}]:[];
        });
      }catch{state.cart=[]}
    }
    function setBusy(value){
      state.busy=Boolean(value);
      const sheet=$(".sheet");if(sheet)sheet.setAttribute("aria-busy",String(state.busy));
      $$("button",$("#sheetHost")||document).forEach(el=>{if(state.busy){el.dataset.busyDisabled=String(el.disabled);el.disabled=true}else if(el.dataset.busyDisabled!==undefined){el.disabled=el.dataset.busyDisabled==="true";delete el.dataset.busyDisabled}});
    }
    async function guarded(task){if(state.busy)return;setBusy(true);try{return await task()}finally{setBusy(false)}}
    function setMessage(msg="",err=""){state.message=msg;state.error=err;renderSheet()}

    function queueProductRefresh(animate=false){
      cancelAnimationFrame(productRefreshFrame);
      productRefreshFrame=requestAnimationFrame(()=>refreshProducts(animate));
    }
    function smoothGo(selector){
      const target=$(selector);if(!target)return;
      target.scrollIntoView({behavior:"smooth",block:"start"});
    }
    function isSearchInput(el=document.activeElement){return Boolean(el?.matches?.("#desktopSearch,#mobileSearch"))}
    function beginSearchSession(){
      clearTimeout(searchReleaseTimer);searchSessionActive=true;
      const grid=$("#productGrid");if(!grid)return;
      searchLayoutHeight=Math.max(searchLayoutHeight,Math.ceil(grid.getBoundingClientRect().height));
      if(searchLayoutHeight>0)grid.style.minHeight=`${searchLayoutHeight}px`;
    }
    function endSearchSession(){
      clearTimeout(searchReleaseTimer);searchReleaseTimer=setTimeout(()=>{
        if(isSearchInput())return;
        searchSessionActive=false;searchLayoutHeight=0;$("#productGrid")?.style.removeProperty("min-height");
      },220);
    }
    function popQuickCategory(category){
      const item=$(`.mk-quick-item[data-quick-category="${CSS.escape(category)}"]`);if(!item)return;
      clearTimeout(quickPopTimer);item.classList.remove("is-popping");void item.offsetWidth;item.classList.add("is-popping");
      quickPopTimer=setTimeout(()=>item.classList.remove("is-popping"),460);
    }

    async function sheetClick(e){
      const a=e.target.closest("[data-sheet-action]")?.dataset.sheetAction;
      if(a){e.preventDefault();await sheetAction(a,e.target.closest("[data-sheet-action]"));return}
      const qty=e.target.closest("[data-qty]");if(qty){
        const item=state.cart.find(i=>i.key===qty.dataset.key);
        if(item){
          const delta=Number(qty.dataset.qty)||0,max=10;
          if(delta>0){if(max>item.quantity)item.quantity=Math.min(max,item.quantity+delta)}else item.quantity=Math.max(0,item.quantity+delta);
          if(item.quantity<=0)state.cart=state.cart.filter(i=>i!==item);
          saveCart();renderSheet({preserve:true});updateHeader();
        }
        return
      }
      const rem=e.target.closest("[data-remove]");if(rem){state.cart=state.cart.filter(i=>i.key!==rem.dataset.remove);saveCart();renderSheet({preserve:true});updateHeader();return}
      const order=e.target.closest("[data-order]");if(order){const o=state.orders.find(x=>x.id===order.dataset.order);openSheet("orderDetail",o);return}
      const resume=e.target.closest("[data-resume-bank]");if(resume){const o=state.orders.find(x=>x.id===resume.dataset.resumeBank);openSheet("orderBank",o)}
    }
    async function sheetAction(a,el){
      if(a==="close")return closeSheet();
      if(a==="go-home"){closeSheet();setTimeout(()=>$("#top")?.scrollIntoView({behavior:"smooth"}),300);return}
      if(a==="go-products"){closeSheet();setTimeout(()=>$("#products")?.scrollIntoView({behavior:"smooth"}),300);return}
      if(a==="topup")return state.user?openSheet("topup"):openSheet("auth",{after:"topup"});
      if(a==="orders")return state.user?openSheet("orders"):openSheet("auth",{after:"orders"});
      if(a==="toggle-auth"){const form=$("[data-form=auth]");const btn=$("[data-mode]",form);const login=btn.dataset.mode==="login";btn.dataset.mode=login?"register":"login";btn.textContent=login?"Đăng ký":"Đăng nhập";el.textContent=login?"Đã có tài khoản? Đăng nhập":"Chưa có tài khoản? Đăng ký";$("#authTitle").textContent=login?"Tạo tài khoản NovaKey":"Đăng nhập để tiếp tục";return}
      if(a==="checkout"){if(!state.user)return openSheet("auth",{after:"payment"});return openSheet("payment")}
      if(a==="back-cart")return openSheet("cart");
      if(a==="back-payment")return openSheet("payment");
      if(a==="back-topup")return openSheet("topup");
      if(a==="back-orders")return openSheet("orders");
      if(a==="open-bank-topup")return openSheet("bankTopup");
      if(a==="open-card-topup")return openSheet("cardTopup",{face:100000});
      if(a==="open-gift-card-topup")return openSheet("giftCardTopup");
      if(a==="remove-coupon"){state.coupon=null;state.message="Đã bỏ mã giảm giá.";state.error="";return renderSheet({preserve:false})}
      if(a==="pay-bank")return guarded(()=>createOrder("bank"));
      if(a==="pay-card")return openSheet("orderCard",{face:100000});
      if(a==="pay-balance")return guarded(()=>createOrder("balance"));
      if(a==="confirm-bank-topup")return guarded(()=>confirmBankTopup(el));
      if(a==="confirm-order-bank")return guarded(()=>confirmOrderBank(el.dataset.orderId));
      if(a==="logout"){await signOut(auth);closeSheet();return}
    }
    function sheetChange(e){
      if(e.target.id!=="cardFace"&&e.target.id!=="orderCardFace")return;
      const face=Number(e.target.value),rate=CARD_RATES.find(x=>x.face===face);
      state.payload={...(state.payload||{}),face};
      const preview=e.target.closest("form")?.querySelector(".receive-box strong");
      if(preview&&rate)preview.textContent=money(rate.receive);
    }
    async function sheetSubmit(e){
      e.preventDefault();if(state.busy)return;const form=e.target,kind=form.dataset.form;state.error="";state.message="";
      await guarded(async()=>{
        try{
          if(kind==="auth"){
            const data=new FormData(form),mode=$("[data-mode]",form).dataset.mode,email=String(data.get("email")||"").trim(),password=String(data.get("password")||"");
            if(mode==="register")await createUserWithEmailAndPassword(auth,email,password);else await signInWithEmailAndPassword(auth,email,password);
            const after=state.payload?.after||"cart";openSheet(after);return;
          }
          if(kind==="coupon")return applyCoupon(form);
          if(kind==="card-topup")return submitCardTopup(form);
          if(kind==="gift-card-topup")return submitGiftCardTopup(form);
          if(kind==="order-card")return submitOrderCard(form);
        }catch(err){console.error(err);state.error=friendlyError(err);renderSheet()}
      });

    function friendlyError(err){const c=err?.code||"";if(c.includes("invalid-credential"))return"Email hoặc mật khẩu không đúng.";if(c.includes("email-already"))return"Email này đã được sử dụng.";if(c.includes("permission-denied"))return"Firebase Rules chưa cho phép thao tác này.";if(c.includes("network")||c.includes("unavailable"))return"Kết nối mạng không ổn định, vui lòng thử lại.";return err?.message||"Không thể hoàn tất thao tác, vui lòng thử lại."}

    function orderPayload(method,card=null){
      const items=state.cart.map(i=>({productId:i.product.id,productName:i.product.name,planName:i.plan.name,unitPrice:i.plan.price,quantity:i.quantity,lineTotal:i.plan.price*i.quantity}));
      const subtotal=cartTotal(),discountAmount=couponDiscount();
      return {userId:state.user.uid,customerEmail:state.user.email||"",paymentMethod:method,items,itemCount:cartCount(),subtotal,discountAmount,discountCode:state.coupon?.code||"",discountSnapshot:state.coupon?{type:state.coupon.type,value:Number(state.coupon.value)||0,maxDiscount:Number(state.coupon.maxDiscount)||0,minOrder:Number(state.coupon.minOrder)||0,productIds:Array.isArray(state.coupon.productIds)?state.coupon.productIds:[]}:null,total:Math.max(0,subtotal-discountAmount),status:method==="bank"?"awaiting_payment":"payment_review",card,delivery:[],rejectionReason:"",createdAt:serverTimestamp(),updatedAt:serverTimestamp()}
    }
    function validateCart(){
      if(!state.cart.length)throw Error("Giỏ hàng đang trống.");
      if(state.stockError)throw Error("Không thể kiểm tra kho lúc này, vui lòng thử lại sau.");
      if(!state.stockLoaded)throw Error("Kho hàng vẫn đang tải, vui lòng đợi vài giây.");
      for(const i of state.cart)if(!Number.isInteger(i.quantity)||i.quantity<1||i.quantity>10)throw Error("Số lượng sản phẩm không hợp lệ.");
    }
    async function inventoryReservationPlan(){
      const snap=await getDocs(query(collection(db,"inventory"),where("status","==","available")));
      const pool=snap.docs.map(d=>({id:d.id,ref:d.ref,...d.data()})),chosen=[],pending=[];
      for(const item of state.cart){
        const available=pool.filter(x=>x.productId===item.product.id&&x.planName===item.plan.name&&!chosen.some(c=>c.id===x.id));
        chosen.push(...available.slice(0,item.quantity));
        if(available.length<item.quantity)pending.push({productId:item.product.id,productName:item.product.name,planName:item.plan.name,quantity:item.quantity-available.length});
      }
      return {ready:pending.length===0,chosen,pending};
    }
    async function createOrder(method,card=null){
      try{
        if(!state.user)return openSheet("auth",{after:"payment"});validateCart();
        const coupon=state.coupon?await validateCouponForCheckout():null;
        if(coupon)state.coupon=coupon;
        const payable=cartPayable();
        if(method==="balance"&&state.balance<payable)throw Error(`Số dư còn thiếu ${money(payable-state.balance)}.`);
        const ref=doc(collection(db,"orders")),code=`NVK-${ref.id.slice(0,8).toUpperCase()}`;

        if(method==="balance"){
          const reservation=await inventoryReservationPlan(),walletRef=doc(db,"wallets",state.user.uid),couponRef=coupon?doc(db,"discountCodes",coupon.code):null;
          let finalData=null;
          await runTransaction(db,async tx=>{
            const walletSnap=await tx.get(walletRef),balance=walletSnap.exists()?Number(walletSnap.data().balance)||0:0;
            if(balance<payable)throw Error(`Số dư còn thiếu ${money(payable-balance)}.`);
            let liveCoupon=null;
            if(couponRef){const snap=await tx.get(couponRef);if(!snap.exists())throw Error("Mã giảm giá không còn tồn tại.");liveCoupon={id:snap.id,...snap.data(),code:snap.id};assertCouponUsable(liveCoupon)}
            const liveInventory=[];
            if(reservation.ready){for(const item of reservation.chosen){const snap=await tx.get(item.ref);if(!snap.exists()||snap.data().status!=="available")throw Error("Một tài khoản trong kho vừa được người khác mua.");liveInventory.push({id:snap.id,ref:item.ref,...snap.data()})}}
            const delivery=reservation.ready?liveInventory.map(x=>({productName:x.productName,planName:x.planName,type:"credential",account:x.account,password:x.password,note:x.note||"Đổi mật khẩu sau khi đăng nhập nếu sản phẩm cho phép."})):[];
            finalData={...orderPayload(method,card),orderCode:code,status:reservation.ready?"fulfilled":"awaiting_delivery",delivery,pendingItems:reservation.pending,paidAt:serverTimestamp(),...(reservation.ready?{fulfilledAt:serverTimestamp()}:{})};
            tx.set(ref,finalData);
            tx.set(walletRef,{balance:balance-payable,updatedAt:serverTimestamp()},{merge:true});
            if(couponRef)tx.update(couponRef,{usedCount:(Number(liveCoupon.usedCount)||0)+1,updatedAt:serverTimestamp()});
            if(reservation.ready){
              for(const item of liveInventory)tx.update(item.ref,{status:"sold",orderId:ref.id,userId:state.user.uid,soldAt:serverTimestamp()});
              for(const item of state.cart)tx.set(doc(db,"stock",stockId(item.product.id,item.plan.name)),{productId:item.product.id,productName:item.product.name,planName:item.plan.name,count:Math.max(0,stockCount(item.product,item.plan)-item.quantity),updatedAt:serverTimestamp()},{merge:true});
            }
          });
          const o={id:ref.id,...finalData,createdAt:null};state.cart=[];state.coupon=null;saveCart();updateHeader();openSheet("orderDetail",o);
          state.message=reservation.ready?"Thanh toán thành công, sản phẩm trong kho đã được giao ngay.":"Thanh toán thành công, sản phẩm order đang chờ bổ sung kho để giao.";
          return;
        }

        const data={...orderPayload(method,card),orderCode:code,pendingItems:[]};
        if(coupon){
          const couponRef=doc(db,"discountCodes",coupon.code);
          await runTransaction(db,async tx=>{const snap=await tx.get(couponRef);if(!snap.exists())throw Error("Mã giảm giá không còn tồn tại.");const live={id:snap.id,...snap.data(),code:snap.id};assertCouponUsable(live);tx.set(ref,data);tx.update(couponRef,{usedCount:(Number(live.usedCount)||0)+1,updatedAt:serverTimestamp()})});
        }else await setDoc(ref,data);
        const o={id:ref.id,...data,createdAt:null};
        if(method==="bank")openSheet("orderBank",o);else{state.cart=[];state.coupon=null;saveCart();updateHeader();openSheet("orderDetail",{...o,status:"payment_review"});state.message="Đã gửi thông tin thanh toán, đang chờ xác nhận."}
      }catch(err){state.error=friendlyError(err);renderSheet()}
    }
    async function confirmOrderBank(id){
      try{await updateDoc(doc(db,"orders",id),{status:"payment_review",updatedAt:serverTimestamp()});state.cart=[];state.coupon=null;saveCart();updateHeader();const o=state.orders.find(x=>x.id===id)||state.payload;openSheet("orderDetail",{...o,status:"payment_review"});state.message="Đã ghi nhận, đơn đang chờ đối soát.";renderSheet()}catch(err){state.error=friendlyError(err);renderSheet()}

    async function submitOrderCard(form){
      const d=new FormData(form),face=Number(d.get("face")),rate=CARD_RATES.find(x=>x.face===face);if(!rate)throw Error("Mệnh giá không hợp lệ.");
      const serial=d.get("serial").trim(),pin=d.get("pin").trim();if(serial.length<6||pin.length<6)throw Error("Vui lòng nhập đúng serial và mã thẻ.");
      await createOrder("card",{provider:d.get("provider"),serial,code:pin,declaredAmount:face,expectedCredit:rate.receive});
    }
    function assertCouponUsable(coupon){
      if(!coupon||coupon.active===false)throw Error("Mã giảm giá đã tắt hoặc không hợp lệ.");
      const limit=Number(coupon.usageLimit||0),used=Number(coupon.usedCount||0);if(limit>0&&used>=limit)throw Error("Mã giảm giá đã hết lượt sử dụng.");
      const expires=coupon.expiresAt?.toDate?.();if(expires&&expires.getTime()<Date.now())throw Error("Mã giảm giá đã hết hạn.");
      if(cartTotal()<Number(coupon.minOrder||0))throw Error(`Đơn hàng tối thiểu ${money(coupon.minOrder)} để dùng mã này.`);
      const ids=Array.isArray(coupon.productIds)?coupon.productIds.filter(Boolean):[];if(ids.length&&!state.cart.some(i=>ids.includes(i.product.id)))throw Error("Mã này không áp dụng cho sản phẩm trong giỏ.");
      if(couponDiscount(coupon)<=0)throw Error("Mã chưa áp dụng được cho giỏ hàng hiện tại.");
      return coupon
    }

      const code=normalizeCode(new FormData(form).get("code"));if(!code)throw Error("Vui lòng nhập mã giảm giá.");
      const snap=await getDoc(doc(db,"discountCodes",code));if(!snap.exists())throw Error("Mã giảm giá không tồn tại.");
      const coupon={id:snap.id,...snap.data(),code:snap.id};assertCouponUsable(coupon);state.coupon=coupon;state.error="";state.message=`Đã áp dụng mã ${code}, giảm ${money(couponDiscount(coupon))}.`;renderSheet({preserve:false})
    }
    async function validateCouponForCheckout(){
      if(!state.coupon)return null;const code=normalizeCode(state.coupon.code),snap=await getDoc(doc(db,"discountCodes",code));if(!snap.exists())throw Error("Mã giảm giá không còn tồn tại.");const coupon={id:snap.id,...snap.data(),code:snap.id};assertCouponUsable(coupon);return coupon
    }
    async function submitGiftCardTopup(form){
      if(!state.user)throw Error("Vui lòng đăng nhập trước khi dùng gift card.");
      const code=normalizeCode(new FormData(form).get("code"));if(code.length<6)throw Error("Mã gift card không hợp lệ.");
      const giftRef=doc(db,"giftCards",code),walletRef=doc(db,"wallets",state.user.uid),topupRef=doc(collection(db,"topups"));
      let credited=0;
      await runTransaction(db,async tx=>{
        const giftSnap=await tx.get(giftRef);if(!giftSnap.exists())throw Error("Mã gift card không tồn tại.");
        const gift=giftSnap.data();if(gift.active===false||gift.status==="used"||gift.usedBy)throw Error("Mã gift card đã được sử dụng hoặc đã bị tắt.");
        credited=Number(gift.value)||0;if(!Number.isInteger(credited)||credited<1000)throw Error("Giá trị gift card không hợp lệ.");

        tx.set(topupRef,{userId:state.user.uid,customerEmail:state.user.email||"",reference:`GIFT-${topupRef.id.slice(0,8).toUpperCase()}`,method:"giftcard",giftCardCode:code,amount:credited,expectedCredit:credited,approvedAmount:credited,status:"approved",card:null,rejectionReason:"",createdAt:serverTimestamp(),updatedAt:serverTimestamp()});
      });
      openSheet("topup");state.error="";state.message=`Nạp gift card thành công, đã cộng ${money(credited)} vào số dư.`;renderSheet()
    }

mber(c.maxDiscount)>0?`Tối đa ${money(c.maxDiscount)}`:"Không giới hạn"}</b></div><div class="record-actions"><button class="${c.active===false?"secondary-admin":"danger"}" data-toggle-discount="${esc(c.id)}">${c.active===false?"Bật lại":"Tắt mã"}</button></div></article>`).join(""):`<div class="empty">Chưa có mã giảm giá.</div>`}</div></div></div>`}

    function renderAdmin(){
      $("#sheetHost").innerHTML="";document.body.style.overflow="";
      if(!state.user){$("#app").innerHTML=adminLoginMarkup(false);bindAdmin();return}
      if(!state.admin){$("#app").innerHTML=adminLoginMarkup(true);bindAdmin();return}
      $("#app").innerHTML=adminShell();bindAdmin();
    }
    function bindAdmin(){
      const root=$("#app");root.onclick=adminClick;root.onsubmit=adminSubmit;root.onchange=e=>{if(e.target.id==="adminProduct"){const p=selectedProduct(e.target.value);$("#adminPlan").innerHTML=p.plans.map(x=>`<option>${esc(x.name)}</option>`).join("")}};
    }
    async function adminClick(e){
      const tab=e.target.closest("[data-admin-tab]");if(tab){state.adminTab=tab.dataset.adminTab;state.message=state.error="";renderAdmin();return}
      const a=e.target.closest("[data-admin-action]")?.dataset.adminAction;
      if(a==="logout")return guarded(()=>signOut(auth));if(a==="retry-admin")return guarded(checkAdmin);if(a==="switch-register"){state.adminAuthMode=state.adminAuthMode==="login"?"register":"login";state.error="";renderAdmin();return}if(a==="sync-stock")return guarded(syncStock);
      const approve=e.target.closest("[data-approve-order]");if(approve)return guarded(()=>adminApproveOrder(approve.dataset.approveOrder,false));
      const support=e.target.closest("[data-support-order]");if(support)return guarded(()=>adminApproveOrder(support.dataset.supportOrder,true));
      const reject=e.target.closest("[data-reject-order]");if(reject)return guarded(()=>adminRejectOrder(reject.dataset.rejectOrder));
      const at=e.target.closest("[data-approve-topup]");if(at){const input=$(`[data-credit="${at.dataset.approveTopup}"]`);return guarded(()=>adminApproveTopup(at.dataset.approveTopup,input?Number(input.value):0))}
      const rt=e.target.closest("[data-reject-topup]");if(rt)return guarded(()=>adminRejectTopup(rt.dataset.rejectTopup));
      const tg=e.target.closest("[data-toggle-gift]");if(tg)return guarded(()=>toggleGiftCard(tg.dataset.toggleGift));
      const td=e.target.closest("[data-toggle-discount]");if(td)return guarded(()=>toggleDiscountCode(td.dataset.toggleDiscount));
    }
    async function adminSubmit(e){
      e.preventDefault();if(state.busy)return;const form=e.target,kind=form.dataset.adminForm;state.error=state.message="";
      await guarded(async()=>{
        try{
          if(kind==="login"){const d=new FormData(form),email=String(d.get("email")||"").trim(),password=String(d.get("password")||"");if(state.adminAuthMode==="register")await createUserWithEmailAndPassword(auth,email,password);else await signInWithEmailAndPassword(auth,email,password);return}
          if(kind==="inventory"){const d=new FormData(form),p=selectedProduct(d.get("product")),plan=d.get("plan");await addDoc(collection(db,"inventory"),{productId:p.id,productName:p.name,planName:plan,account:String(d.get("account")||"").trim(),password:String(d.get("password")||""),note:String(d.get("note")||"").trim(),status:"available",createdAt:serverTimestamp()});state.message="Đã thêm tài khoản vào kho.";await syncStock(false);return}
          if(kind==="giftcard"){const d=new FormData(form),code=normalizeCode(d.get("code")),value=Number(d.get("value"));if(code.length<6||!Number.isInteger(value)||value<1000)throw Error("Mã hoặc giá trị gift card không hợp lệ.");await setDoc(doc(db,"giftCards",code),{code,value,active:true,status:"available",usedBy:"",usedByEmail:"",createdAt:serverTimestamp(),updatedAt:serverTimestamp()});state.message=`Đã tạo gift card ${code}.`;form.reset();renderAdmin();return}
          if(kind==="discount"){const d=new FormData(form),code=normalizeCode(d.get("code")),type=String(d.get("type")),value=Number(d.get("value")),minOrder=Math.max(0,Number(d.get("minOrder"))||0),maxDiscount=Math.max(0,Number(d.get("maxDiscount"))||0),usageLimit=Math.max(0,Number(d.get("usageLimit"))||0),productId=String(d.get("productId")||"");if(code.length<3||!["percent","fixed"].includes(type)||value<=0||type==="percent"&&value>100)throw Error("Thông tin mã giảm giá không hợp lệ.");await setDoc(doc(db,"discountCodes",code),{code,type,value,minOrder,maxDiscount,usageLimit,usedCount:0,productIds:productId?[productId]:[],active:true,createdAt:serverTimestamp(),updatedAt:serverTimestamp()});state.message=`Đã tạo mã giảm giá ${code}.`;form.reset();renderAdmin();return}
          if(kind==="settings"){const d=new FormData(form),data={bankId:String(d.get("bankId")||"").trim(),bankName:String(d.get("bankName")||"").trim(),accountNumber:String(d.get("accountNumber")||"").trim(),accountName:String(d.get("accountName")||"").trim().toUpperCase(),zaloUrl:String(d.get("zaloUrl")||"").trim(),updatedAt:serverTimestamp()};await setDoc(doc(db,"settings","payment"),data,{merge:true});state.settings={...state.settings,...data};state.message="Đã lưu cấu hình thanh toán.";renderAdmin()}
        }catch(err){state.error=friendlyError(err);renderAdmin()}
      });
    }
    async function checkAdmin(){
      if(!state.user){state.admin=false;renderAdmin();return}
      try{state.admin=(await getDoc(doc(db,"admins",state.user.uid))).exists();if(state.admin)subscribeAdmin();renderAdmin()}catch(err){state.admin=false;state.error=friendlyError(err);renderAdmin()}
    }
    function queueAdminRender(){cancelAnimationFrame(adminRenderFrame);adminRenderFrame=requestAnimationFrame(renderAdmin)}
    function subscribeAdmin(){
      adminUnsubs.forEach(u=>u());adminUnsubs=[];
      adminUnsubs.push(onSnapshot(collection(db,"orders"),s=>{state.adminOrders=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));queueAdminRender()},()=>{}));
      adminUnsubs.push(onSnapshot(collection(db,"topups"),s=>{state.adminTopups=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));queueAdminRender()},()=>{}));
      adminUnsubs.push(onSnapshot(collection(db,"inventory"),s=>{state.adminInventory=s.docs.map(d=>({id:d.id,...d.data()}));queueAdminRender()},()=>{}));
      adminUnsubs.push(onSnapshot(collection(db,"giftCards"),s=>{state.adminGiftCards=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>String(a.id).localeCompare(String(b.id)));queueAdminRender()},()=>{}));
      adminUnsubs.push(onSnapshot(collection(db,"discountCodes"),s=>{state.adminDiscountCodes=s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>String(a.id).localeCompare(String(b.id)));queueAdminRender()},()=>{}));
    }
    function validateOrderPricing(o){
      let subtotal=0,count=0;for(const i of o.items||[]){const p=selectedProduct(i.productId),plan=p?.plans.find(x=>x.name===i.planName);if(!p||!plan||i.productName!==p.name||i.unitPrice!==plan.price||i.lineTotal!==plan.price*i.quantity||i.quantity<1)throw Error("Dữ liệu giá của đơn không hợp lệ.");subtotal+=i.lineTotal;count+=i.quantity}const discount=Math.max(0,Number(o.discountAmount)||0),expected=Math.max(0,subtotal-discount);if((o.subtotal!==undefined&&Number(o.subtotal)!==subtotal)||Number(o.total)!==expected||count!==o.itemCount||discount>subtotal)throw Error("Tổng tiền của đơn không hợp lệ.");return expected
    }
    async function adminApproveOrder(id,support){
      state.error=state.message="";
      try{
        const o=state.adminOrders.find(x=>x.id===id);if(!o)throw Error("Không tìm thấy đơn.");const total=validateOrderPricing(o),chosen=[],delivery=[];
        for(const item of o.items){
          if(support){delivery.push({productName:item.productName,planName:item.planName,type:"support",note:`Liên hệ admin và cung cấp mã đơn ${o.orderCode} để được hỗ trợ bàn giao.`});continue}
          const available=state.adminInventory.filter(x=>x.status==="available"&&x.productId===item.productId&&x.planName===item.planName&&!chosen.some(c=>c.id===x.id));if(available.length<item.quantity)throw Error(`Kho thiếu ${item.productName} - ${item.planName}.`);
          for(const inv of available.slice(0,item.quantity)){chosen.push(inv);delivery.push({productName:item.productName,planName:item.planName,type:"credential",account:inv.account,password:inv.password,note:inv.note||"Đổi mật khẩu sau khi đăng nhập nếu sản phẩm cho phép."})}
        }
        const orderRef=doc(db,"orders",id),walletRef=doc(db,"wallets",o.userId),invRefs=chosen.map(x=>doc(db,"inventory",x.id));
        await runTransaction(db,async tx=>{
          const os=await tx.get(orderRef);if(!os.exists()||!["payment_review","awaiting_delivery"].includes(os.data().status))throw Error("Đơn đã được xử lý.");
          let walletBalance=null;
          if(o.paymentMethod==="balance"&&os.data().status==="payment_review"){const ws=await tx.get(walletRef);walletBalance=ws.exists()?Number(ws.data().balance)||0:0;if(walletBalance<total)throw Error("Số dư khách hàng không đủ.")}
          const liveInventory=[];
          for(const r of invRefs){const snap=await tx.get(r);if(!snap.exists()||snap.data().status!=="available")throw Error("Một tài khoản trong kho vừa được dùng.");liveInventory.push({ref:r,...snap.data()})}
          if(walletBalance!==null)tx.set(walletRef,{balance:walletBalance-total,updatedAt:serverTimestamp()},{merge:true});
          for(const item of liveInventory)tx.update(item.ref,{status:"sold",orderId:id,userId:o.userId,soldAt:serverTimestamp()});
          tx.update(orderRef,{status:"fulfilled",delivery,pendingItems:[],paidAt:os.data().paidAt||serverTimestamp(),fulfilledAt:serverTimestamp(),updatedAt:serverTimestamp()});
        });
        state.message="Đã duyệt và bàn giao đơn hàng.";await syncStock(false);renderAdmin();
      }catch(err){state.error=friendlyError(err);renderAdmin()}
    }
    async function adminRejectOrder(id){try{await updateDoc(doc(db,"orders",id),{status:"rejected",rejectionReason:"Không xác minh được thanh toán.",updatedAt:serverTimestamp()});state.message="Đã từ chối đơn.";renderAdmin()}catch(err){state.error=friendlyError(err);renderAdmin()}}
    async function adminApproveTopup(id,amount){
      try{const ref=doc(db,"topups",id);await runTransaction(db,async tx=>{const s=await tx.get(ref);if(!s.exists()||s.data().status!=="payment_review")throw Error("Yêu cầu đã được xử lý.");const topup=s.data();let credit=Number(amount)||0,giftRef=null;if(topup.method==="giftcard"){giftRef=doc(db,"giftCards",topup.giftCardCode);const gs=await tx.get(giftRef);if(!gs.exists()||gs.data().active===false)throw Error("Gift card không tồn tại hoặc đã được sử dụng.");credit=Number(gs.data().value)||0;if(credit<1000)throw Error("Giá trị gift card không hợp lệ.")}else if(!Number.isInteger(credit)||credit<2000)throw Error("Số tiền cộng tối thiểu 2.000đ.");const wallet=doc(db,"wallets",topup.userId),ws=await tx.get(wallet),bal=ws.exists()?Number(ws.data().balance)||0:0;tx.set(wallet,{balance:bal+credit,updatedAt:serverTimestamp()},{merge:true});if(giftRef)tx.update(giftRef,{active:false,status:"used",usedBy:topup.userId,usedByEmail:topup.customerEmail||"",usedAt:serverTimestamp(),updatedAt:serverTimestamp()});tx.update(ref,{status:"approved",approvedAmount:credit,approvedAt:serverTimestamp(),updatedAt:serverTimestamp()})});state.message="Đã cộng số dư cho khách.";renderAdmin()}catch(err){state.error=friendlyError(err);renderAdmin()}
    }
    async function toggleGiftCard(code){const item=state.adminGiftCards.find(x=>x.id===code);if(!item)return;await updateDoc(doc(db,"giftCards",code),{active:item.active===false,status:item.active===false?"available":"disabled",updatedAt:serverTimestamp()});state.message=item.active===false?"Đã kích hoạt lại gift card.":"Đã tắt gift card.";renderAdmin()}
    async function toggleDiscountCode(code){const item=state.adminDiscountCodes.find(x=>x.id===code);if(!item)return;await updateDoc(doc(db,"discountCodes",code),{active:item.active===false,updatedAt:serverTimestamp()});state.message=item.active===false?"Đã bật lại mã giảm giá.":"Đã tắt mã giảm giá.";renderAdmin()}
    async function adminRejectTopup(id){try{await updateDoc(doc(db,"topups",id),{status:"rejected",rejectionReason:"Không xác minh được giao dịch.",updatedAt:serverTimestamp()});state.message="Đã từ chối yêu cầu.";renderAdmin()}catch(err){state.error=friendlyError(err);renderAdmin()}}
    async function syncStock(show=true){
      try{
        const inventorySnap=await getDocs(collection(db,"inventory"));
        const available=inventorySnap.docs.map(d=>({id:d.id,...d.data()})).filter(x=>x.status==="available"),batch=writeBatch(db);
        for(const p of PRODUCTS)for(const plan of p.plans){const count=available.filter(x=>x.productId===p.id&&x.planName===plan.name).length;batch.set(doc(db,"stock",stockId(p.id,plan.name)),{productId:p.id,productName:p.name,planName:plan.name,count,updatedAt:serverTimestamp()},{merge:true})}
        await batch.commit();if(show){state.message="Đã đồng bộ số lượng tồn kho công khai.";renderAdmin()}
      }catch(err){state.error=friendlyError(err);renderAdmin()}
    }

    restoreCart();
    subscribePublic();
    onAuthStateChanged(auth,async user=>{
      state.user=user||null;subscribeUser(user);
      if(isAdminPage){await checkAdmin()}else{if(!$("#app").children.length)renderStore();else updateHeader();if(state.sheet==="auth"&&user){const after=state.payload?.after||"cart";openSheet(after)}}
    });
    if(!isAdminPage)renderStore();else renderAdmin();
  </script>
</body>
</html>
